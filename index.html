<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Group4Market — Live Factory</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono&family=DM+Sans:wght@400;700&display=swap');
  :root { --bg: #0a0b0f; --surface: #111318; --border: #1e2029; --text: #e8eaf0; --accent: #7c6cff; --yes: #00d98b; --no: #ff4d6d; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px; }
  header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
  .logo { font-family: 'Space Mono', monospace; font-size: 2.5rem; font-weight: 700; color: var(--accent); letter-spacing: -2px; }
  .status-bar { background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 8px; font-family: 'Space Mono'; font-size: 0.8rem; color: #ff9f43; margin-bottom: 30px; border-left: 5px solid #ff9f43; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 25px; border-top: 6px solid var(--accent); }
  .question { font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; }
  .pool-box { flex: 1; background: #000; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
  button { cursor: pointer; font-family: 'Space Mono'; font-weight: 700; border-radius: 8px; border: none; }
  .btn-refresh { background: var(--surface); color: var(--text); border: 1px solid var(--border); padding: 10px 20px; }
</style>
</head>
<body>

<header>
  <div class="logo">Group4Market</div>
  <button class="btn-refresh" onclick="location.reload()">🔄 Force Refresh</button>
</header>

<div id="debug-status" class="status-bar">🔌 Connecting to Sepolia Network...</div>
<div id="market-grid" class="grid"></div>

<script>
// YOUR SETTINGS
const CONTRACT_ADDR = "0x2e5E1c6B47C34Ff2718E357A4009e03bF8aD1ec0";
const INFURA_RPC = "https://sepolia.infura.io/v3/f88f43b3adbb4bd398b9465e5d931e4d";

// Simplified ABI - focusing only on the essentials to prevent errors
const ABI = [
  "function marketCount() view returns (uint256)",
  "function getMarket(uint256) view returns (string question, address creator, uint256 deadline, uint8 phase, uint256 yesPool, uint256 noPool, bool resolved, bool outcomeYes, address yesAuditor, address noAuditor, address finalDecider, uint256 deciderFee, uint256 potAtSettle)"
];

async function init() {
    const status = document.getElementById('debug-status');
    const grid = document.getElementById('market-grid');
    
    try {
        const provider = new ethers.JsonRpcProvider(INFURA_RPC);
        
        // Test connection
        const network = await provider.getNetwork();
        status.innerText = `🌐 Connected to ${network.name}. Reading contract...`;

        const contract = new ethers.Contract(CONTRACT_ADDR, ABI, provider);
        
        // Try to get count
        const count = await contract.marketCount();
        const total = Number(count);
        
        if (total === 0) {
            status.innerText = "✅ Connected! But 0 markets found in this contract. Add one in your notebook!";
            return;
        }

        status.innerText = `✅ Found ${total} markets. Rendering...`;
        grid.innerHTML = "";

        for (let i = 0; i < total; i++) {
            try {
                const m = await contract.getMarket(i);
                grid.innerHTML += `
                    <div class="card">
                        <div style="font-family:'Space Mono'; font-size:0.7rem; color:#6b7080;">MARKET ID: ${i}</div>
                        <div class="question">${m[0]}</div>
                        <div style="display:flex; gap:10px;">
                            <div class="pool-box"><small>YES</small><br><b style="color:var(--yes)">${ethers.formatEther(m[4])} ETH</b></div>
                            <div class="pool-box"><small>NO</small><br><b style="color:var(--no)">${ethers.formatEther(m[5])} ETH</b></div>
                        </div>
                    </div>`;
            } catch (e) {
                console.error("Error loading market index " + i, e);
            }
        }
    } catch (err) {
        status.style.color = "#ff4d6d";
        status.style.borderColor = "#ff4d6d";
        status.innerText = "❌ CONNECTION ERROR: " + err.message;
        console.error(err);
    }
}

window.onload = init;
</script>
</body>
</html>
