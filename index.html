<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Group4Market — Prediction Markets</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap');

  :root {
    --bg: #0a0b0f; --surface: #111318; --border: #1e2029; --border2: #2a2d3a;
    --text: #e8eaf0; --muted: #6b7080; --yes: #00d98b; --yes-dim: #00d98b22;
    --no: #ff4d6d; --no-dim: #ff4d6d22; --accent: #7c6cff; --warn: #f5a623;
  }

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; }
  header { position: sticky; top: 0; z-index: 100; background: rgba(10,11,15,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 64px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Space Mono', monospace; font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 0.6rem; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .main { max-width: 1160px; margin: 0 auto; padding: 2rem; }
  
  .btn { font-family: 'Space Mono', monospace; padding: 0.6rem 1.2rem; border-radius: 8px; border: 1px solid var(--border2); background: transparent; color: var(--text); cursor: pointer; font-weight: 700; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-yes { border-color: var(--yes); color: var(--yes); }
  .btn-no { border-color: var(--no); color: var(--no); }

  #markets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
  .market-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
  .question { font-size: 1.1rem; font-weight: 600; }
  .pool-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; font-family: 'Space Mono'; font-size: 0.8rem; }
  .stat-box { background: var(--bg); padding: 0.7rem; border-radius: 8px; border: 1px solid var(--border); }
  
  .bet-input { background: var(--bg); border: 1px solid var(--border2); color: white; padding: 0.6rem; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 0.5rem; }
  .wallet-info { font-family: 'Space Mono'; font-size: 0.7rem; color: var(--muted); }
  .phase-badge { font-family: 'Space Mono'; font-size: 0.6rem; padding: 0.2rem 0.5rem; border-radius: 4px; text-transform: uppercase; border: 1px solid; }
  
  #toast-root { position: fixed; bottom: 1rem; right: 1rem; z-index: 1000; }
  .toast { background: var(--surface); border: 1px solid var(--accent); padding: 1rem; border-radius: 8px; margin-top: 0.5rem; font-family: 'Space Mono'; font-size: 0.8rem; }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div> Group4Market</div>
  <div style="display: flex; gap: 1rem; align-items: center;">
    <div id="wallet-display" class="wallet-info">Not Connected</div>
    <button class="btn btn-primary" id="connect-btn" onclick="connectWallet()">Connect Wallet</button>
  </div>
</header>

<main class="main">
  <div id="markets-grid">
    <div class="empty-state">Syncing with Sepolia Blockchain...</div>
  </div>
</main>

<div id="toast-root"></div>

<script>
// CONFIGURATION - Hardcoded from your backend notebook
const CONTRACT_ADDRESS = "0x8DA1A881D4eA5a8C273aA6877987ef505a097f4a";
const RPC_URL = "https://sepolia.infura.io/v3/f88f43b3adbb4bd398b9465e5d931e4d";
const ABI = [
  "function marketCount() view returns (uint256)",
  "function getMarket(uint256) view returns (string question, address creator, uint256 deadline, uint8 phase, uint256 yesPool, uint256 noPool, bool resolved, bool outcomeYes, address yesAuditor, address noAuditor, address finalDecider, uint256 deciderFee, uint256 potAtSettle)",
  "function placeYes(uint256) payable",
  "function placeNo(uint256) payable",
  "function yesBets(uint256, address) view returns (uint256)",
  "function noBets(uint256, address) view returns (uint256)"
];

let provider, signer, userAddr;

// AUTO-LOAD ON START
window.onload = async () => {
    // Check if MetaMask is installed
    if (window.ethereum) {
        provider = new ethers.BrowserProvider(window.ethereum);
    } else {
        provider = new ethers.JsonRpcProvider(RPC_URL);
    }
    loadMarkets();
};

async function connectWallet() {
    if (!window.ethereum) return alert("Install MetaMask");
    const accounts = await provider.send("eth_requestAccounts", []);
    signer = await provider.getSigner();
    userAddr = accounts[0];
    document.getElementById('wallet-display').innerText = userAddr.slice(0,6) + "..." + userAddr.slice(-4);
    loadMarkets(); // Refresh to show user's personal bets
}

async function loadMarkets() {
    const grid = document.getElementById('markets-grid');
    try {
        const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);
        const count = await contract.marketCount();
        grid.innerHTML = "";

        for (let i = 0; i < count; i++) {
            const m = await contract.getMarket(i);
            let myYes = 0n, myNo = 0n;
            
            if (userAddr) {
                myYes = await contract.yesBets(i, userAddr);
                myNo = await contract.noBets(i, userAddr);
            }

            const card = document.createElement('div');
            card.className = 'market-card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between">
                    <span class="wallet-info">ID: ${i}</span>
                    <span class="phase-badge">${['Open', 'Proposed', 'Settled'][m[3]]}</span>
                </div>
                <div class="question">${m[0]}</div>
                <div class="pool-stats">
                    <div class="stat-box">YES: ${ethers.formatEther(m[4])} ETH</div>
                    <div class="stat-box">NO: ${ethers.formatEther(m[5])} ETH</div>
                </div>
                ${userAddr && (myYes > 0n || myNo > 0n) ? `
                    <div style="font-size:0.7rem; color:var(--accent)">
                        Your Bets: ${ethers.formatEther(myYes)} YES | ${ethers.formatEther(myNo)} NO
                    </div>
                ` : ''}
                <input type="number" step="0.001" id="input-${i}" class="bet-input" placeholder="Amount (ETH)">
                <div style="display:flex; gap:0.5rem">
                    <button class="btn btn-yes" style="flex:1" onclick="bet(${i}, true)">YES</button>
                    <button class="btn btn-no" style="flex:1" onclick="bet(${i}, false)">NO</button>
                </div>
            `;
            grid.appendChild(card);
        }
    } catch (e) {
        grid.innerHTML = "Error connecting to contract. Make sure you are on Sepolia.";
    }
}

async function bet(id, isYes) {
    if (!signer) return connectWallet();
    const amt = document.getElementById(`input-${id}`).value;
    if (!amt) return alert("Enter amount");
    
    const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
    try {
        const tx = isYes ? 
            await contract.placeYes(id, { value: ethers.parseEther(amt) }) : 
            await contract.placeNo(id, { value: ethers.parseEther(amt) });
        notify("Transaction Sent! Waiting for block...");
        await tx.wait();
        notify("Bet Confirmed!");
        loadMarkets();
    } catch (e) {
        alert("Transaction failed: " + e.message);
    }
}

function notify(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerText = msg;
    document.getElementById('toast-root').appendChild(t);
    setTimeout(() => t.remove(), 4000);
}
</script>
</body>
</html>
