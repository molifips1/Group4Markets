<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group 4 Prediction Market</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg:        #0a0a0f;
    --surface:   #111118;
    --border:    #1e1e2e;
    --accent:    #f0c040;
    --green:     #3dffa0;
    --red:       #ff5f6d;
    --muted:     #444466;
    --text:      #e8e8f0;
    --subtext:   #8888aa;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Noise overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.6;
  }

  /* ── Grid lines ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  .wrap { position: relative; z-index: 1; max-width: 880px; margin: 0 auto; padding: 0 24px 80px; }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .logo {
    display: flex; align-items: baseline; gap: 10px;
  }
  .logo-mark {
    font-size: 1.4rem; font-weight: 800; color: var(--accent);
    letter-spacing: -0.03em;
  }
  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem; color: var(--muted); letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  #connectBtn {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem; font-weight: 500;
    padding: 10px 20px;
    border: 1px solid var(--accent);
    background: transparent; color: var(--accent);
    cursor: pointer; letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: background 0.15s, color 0.15s;
  }
  #connectBtn:hover { background: var(--accent); color: var(--bg); }
  #connectBtn.connected {
    border-color: var(--green); color: var(--green);
    font-size: 0.65rem;
  }

  /* ── Setup panel ── */
  .setup-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px 32px 32px;
    margin-bottom: 36px;
  }
  .setup-panel h2 {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 18px;
  }
  .setup-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 200px; }
  .field label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem; color: var(--subtext); letter-spacing: 0.1em; text-transform: uppercase;
  }
  .field input {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.8rem;
    padding: 10px 14px; outline: none; width: 100%;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--accent); }
  .btn-load {
    font-family: 'DM Mono', monospace; font-size: 0.75rem; font-weight: 500;
    padding: 11px 24px; background: var(--accent); color: var(--bg);
    border: none; cursor: pointer; letter-spacing: 0.06em; white-space: nowrap;
    transition: opacity 0.15s;
  }
  .btn-load:hover { opacity: 0.85; }

  /* ── Market card ── */
  #marketCard { display: none; }

  .market-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 32px; gap: 16px; flex-wrap: wrap;
  }
  .market-question {
    font-size: 1.55rem; font-weight: 700; line-height: 1.2;
    letter-spacing: -0.02em; max-width: 580px;
  }
  .phase-badge {
    font-family: 'DM Mono', monospace; font-size: 0.65rem; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    padding: 6px 14px; border: 1px solid;
    white-space: nowrap; margin-top: 4px;
  }
  .phase-open    { border-color: var(--green); color: var(--green); }
  .phase-proposed{ border-color: var(--accent); color: var(--accent); }
  .phase-settled { border-color: var(--muted); color: var(--muted); }

  /* ── Odds bar ── */
  .odds-block { margin-bottom: 32px; }
  .odds-labels {
    display: flex; justify-content: space-between;
    font-family: 'DM Mono', monospace; font-size: 0.75rem;
    color: var(--subtext); margin-bottom: 8px;
  }
  .odds-bar {
    height: 6px; background: var(--border); overflow: hidden;
    position: relative;
  }
  .odds-yes {
    height: 100%; background: var(--green);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .odds-pct {
    display: flex; justify-content: space-between;
    margin-top: 8px;
  }
  .odds-pct span {
    font-size: 1.6rem; font-weight: 800; letter-spacing: -0.04em;
  }
  .yes-pct { color: var(--green); }
  .no-pct  { color: var(--red);   }

  /* ── Stats row ── */
  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: var(--border);
    margin-bottom: 32px;
  }
  .stat {
    background: var(--surface); padding: 18px 20px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat-label {
    font-family: 'DM Mono', monospace; font-size: 0.6rem;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted);
  }
  .stat-value { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.02em; }

  /* ── Action panel ── */
  .action-panel {
    background: var(--surface); border: 1px solid var(--border);
    padding: 28px 32px; margin-bottom: 24px;
  }
  .action-title {
    font-size: 0.65rem; font-weight: 600; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 20px;
  }

  /* Bet section */
  .bet-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .bet-input-wrap { flex: 1; min-width: 140px; }
  .bet-input-wrap label {
    display: block;
    font-family: 'DM Mono', monospace; font-size: 0.65rem;
    color: var(--subtext); letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .bet-input {
    width: 100%;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.85rem;
    padding: 10px 14px; outline: none;
    transition: border-color 0.15s;
  }
  .bet-input:focus { border-color: var(--accent); }

  .btn-yes, .btn-no, .btn-neutral {
    font-family: 'DM Mono', monospace; font-size: 0.75rem; font-weight: 500;
    padding: 11px 28px; border: none; cursor: pointer;
    letter-spacing: 0.06em; text-transform: uppercase;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-yes    { background: var(--green); color: var(--bg); }
  .btn-no     { background: var(--red);   color: #fff; }
  .btn-neutral{ background: var(--accent); color: var(--bg); }
  .btn-yes:hover, .btn-no:hover, .btn-neutral:hover { opacity: 0.85; }
  .btn-yes:active, .btn-no:active, .btn-neutral:active { transform: scale(0.97); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Auditor / claim section */
  .audit-info {
    font-family: 'DM Mono', monospace; font-size: 0.75rem;
    color: var(--subtext); line-height: 1.8; margin-bottom: 18px;
  }
  .audit-info span { color: var(--accent); }
  .audit-btns { display: flex; gap: 12px; flex-wrap: wrap; }

  /* ── Status log ── */
  #statusLog {
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    color: var(--subtext); line-height: 1.9;
    border-top: 1px solid var(--border);
    padding-top: 20px; margin-top: 20px;
    min-height: 32px;
  }
  #statusLog .ok   { color: var(--green); }
  #statusLog .err  { color: var(--red); }
  #statusLog .info { color: var(--accent); }
  #statusLog .link { color: var(--accent); text-decoration: underline; }

  /* ── Outcome banner ── */
  .outcome-banner {
    padding: 24px 32px; margin-bottom: 24px;
    border: 1px solid var(--green);
    background: rgba(61,255,160,0.04);
  }
  .outcome-banner h3 {
    font-size: 1.3rem; font-weight: 800;
    color: var(--green); letter-spacing: -0.02em; margin-bottom: 4px;
  }
  .outcome-banner p {
    font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--subtext);
  }

  /* ── Deadline countdown ── */
  #countdown {
    font-family: 'DM Mono', monospace; font-size: 0.8rem;
    color: var(--accent); text-align: right; margin-bottom: 24px;
  }

  /* ── Responsive ── */
  @media(max-width:600px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .market-question { font-size: 1.2rem; }
    .odds-pct span { font-size: 1.2rem; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <header>
    <div class="logo">
      <span class="logo-mark">G4Market</span>
      <span class="logo-sub">Sepolia Testnet</span>
    </div>
    <button id="connectBtn" onclick="connectWallet()">Connect MetaMask</button>
  </header>

  <!-- Setup -->
  <div class="setup-panel">
    <h2>Load Market</h2>
    <div class="setup-row">
      <div class="field">
        <label>Contract Address</label>
        <input id="contractAddr" type="text" placeholder="0x..." spellcheck="false">
      </div>
      <div class="field" style="max-width:120px">
        <label>Market ID</label>
        <input id="marketIdInput" type="number" value="0" min="0">
      </div>
      <button class="btn-load" onclick="loadMarket()">Load</button>
    </div>
  </div>

  <!-- Market card (hidden until loaded) -->
  <div id="marketCard">

    <div id="countdown"></div>

    <div class="market-header">
      <div class="market-question" id="mQuestion">—</div>
      <div class="phase-badge phase-open" id="phaseBadge">Open</div>
    </div>

    <!-- Odds bar -->
    <div class="odds-block">
      <div class="odds-labels"><span>YES</span><span>NO</span></div>
      <div class="odds-bar"><div class="odds-yes" id="oddsBar" style="width:50%"></div></div>
      <div class="odds-pct">
        <span class="yes-pct" id="yesPct">50%</span>
        <span class="no-pct"  id="noPct">50%</span>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="stat-label">YES Pool</div>
        <div class="stat-value" id="yesPool">— ETH</div>
      </div>
      <div class="stat">
        <div class="stat-label">NO Pool</div>
        <div class="stat-value" id="noPool">— ETH</div>
      </div>
      <div class="stat">
        <div class="stat-label">Total Pot</div>
        <div class="stat-value" id="totalPot">— ETH</div>
      </div>
    </div>

    <!-- Outcome banner (only when settled) -->
    <div class="outcome-banner" id="outcomeBanner" style="display:none">
      <h3 id="outcomeTitle">—</h3>
      <p id="outcomeDetail">—</p>
    </div>

    <!-- ── OPEN phase: place bets ── -->
    <div class="action-panel" id="betPanel">
      <div class="action-title">Place Your Bet</div>
      <div class="bet-row">
        <div class="bet-input-wrap">
          <label>Amount (ETH)</label>
          <input class="bet-input" id="betAmount" type="number" step="0.001" min="0.001" value="0.001">
        </div>
        <button class="btn-yes" id="btnYes" onclick="placeBet(true)">YES ↑</button>
        <button class="btn-no"  id="btnNo"  onclick="placeBet(false)">NO ↓</button>
      </div>
      <div id="statusLog"></div>
    </div>

    <!-- ── PROPOSED phase: auditor vote ── -->
    <div class="action-panel" id="auditPanel" style="display:none">
      <div class="action-title">Auditor Vote Required</div>
      <div class="audit-info" id="auditInfo">Loading auditor info...</div>
      <div class="audit-btns">
        <button class="btn-yes"     id="btnAccept" onclick="castAuditorVote(true)">Accept Proposal</button>
        <button class="btn-no"      id="btnReject" onclick="castAuditorVote(false)">Reject Proposal</button>
        <button class="btn-neutral" id="btnDecide" onclick="castFinalDecide(true)" style="display:none">Cast Final Decision (YES)</button>
        <button class="btn-no"      id="btnDecideNo" onclick="castFinalDecide(false)" style="display:none">Cast Final Decision (NO)</button>
      </div>
      <div id="auditLog"></div>
    </div>

    <!-- ── SETTLED phase: claim winnings ── -->
    <div class="action-panel" id="claimPanel" style="display:none">
      <div class="action-title">Claim Your Winnings</div>
      <p style="font-family:'DM Mono',monospace; font-size:0.8rem; color:var(--subtext); margin-bottom:18px">
        If you bet on the winning side, click below to withdraw your payout.
      </p>
      <div style="display:flex; gap:12px; flex-wrap:wrap">
        <button class="btn-neutral" id="btnClaim" onclick="claimWinnings()">Claim Winnings</button>
        <button class="btn-neutral" id="btnWithdrawCreator" onclick="withdrawFees('creator')" style="display:none">Withdraw Creator Fees</button>
        <button class="btn-neutral" id="btnWithdrawDecider" onclick="withdrawFees('decider')" style="display:none">Withdraw Decider Fees</button>
      </div>
      <div id="claimLog"></div>
    </div>

  </div><!-- /marketCard -->
</div><!-- /wrap -->

<script>
// ============================================================
//  ABI — paste the output of Group4Market_ABI.json here
//  OR leave as-is; the minimal ABI below covers all functions
// ============================================================
const ABI = [
  {"inputs":[{"internalType":"address","name":"_company","type":"address"}],"stateMutability":"nonpayable","type":"constructor"},
  {"anonymous":false,"inputs":[{"indexed":true,"name":"id","type":"uint256"},{"indexed":true,"name":"bettor","type":"address"},{"indexed":false,"name":"isYes","type":"bool"},{"indexed":false,"name":"netAmount","type":"uint256"}],"name":"BetPlaced","type":"event"},
  {"anonymous":false,"inputs":[{"indexed":true,"name":"id","type":"uint256"},{"indexed":false,"name":"outcomeYes","type":"bool"},{"indexed":false,"name":"hadDispute","type":"bool"}],"name":"MarketSettled","type":"event"},
  {"anonymous":false,"inputs":[{"indexed":true,"name":"id","type":"uint256"},{"indexed":true,"name":"winner","type":"address"},{"indexed":false,"name":"amount","type":"uint256"}],"name":"WinningsClaimed","type":"event"},
  {"anonymous":false,"inputs":[{"indexed":true,"name":"id","type":"uint256"},{"indexed":false,"name":"decider","type":"address"}],"name":"DeciderPicked","type":"event"},
  {"inputs":[{"name":"_id","type":"uint256"},{"name":"_acceptProposed","type":"bool"}],"name":"auditorVote","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[{"name":"_id","type":"uint256"}],"name":"claim","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[{"name":"_id","type":"uint256"},{"name":"_outcomeYes","type":"bool"}],"name":"finalDecide","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[{"name":"_id","type":"uint256"}],"name":"getMarket","outputs":[
    {"name":"question","type":"string"},{"name":"creator","type":"address"},
    {"name":"deadline","type":"uint256"},{"name":"phase","type":"uint8"},
    {"name":"yesPool","type":"uint256"},{"name":"noPool","type":"uint256"},
    {"name":"resolved","type":"bool"},{"name":"outcomeYes","type":"bool"},
    {"name":"yesAuditor","type":"address"},{"name":"noAuditor","type":"address"},
    {"name":"finalDecider","type":"address"},{"name":"deciderFee","type":"uint256"},
    {"name":"potAtSettle","type":"uint256"}
  ],"stateMutability":"view","type":"function"},
  {"inputs":[{"name":"_id","type":"uint256"}],"name":"getOdds","outputs":[{"name":"yesPct","type":"uint256"},{"name":"noPct","type":"uint256"}],"stateMutability":"view","type":"function"},
  {"inputs":[{"name":"_id","type":"uint256"},{"name":"_isYes","type":"bool"}],"name":"claimed","outputs":[{"name":"","type":"bool"}],"stateMutability":"view","type":"function"},
  {"inputs":[{"name":"","type":"uint256"},{"name":"","type":"address"}],"name":"claimed","outputs":[{"name":"","type":"bool"}],"stateMutability":"view","type":"function"},
  {"inputs":[{"name":"_id","type":"uint256"}],"name":"placeYes","outputs":[],"stateMutability":"payable","type":"function"},
  {"inputs":[{"name":"_id","type":"uint256"}],"name":"placeNo","outputs":[],"stateMutability":"payable","type":"function"},
  {"inputs":[{"name":"_id","type":"uint256"},{"name":"_outcomeYes","type":"bool"}],"name":"proposeOutcome","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[],"name":"withdrawCreatorFees","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[],"name":"withdrawCompanyFees","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[],"name":"withdrawDeciderFees","outputs":[],"stateMutability":"nonpayable","type":"function"},
  {"inputs":[{"name":"","type":"address"}],"name":"creatorFeeOwed","outputs":[{"name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
  {"inputs":[{"name":"","type":"address"}],"name":"deciderFeeOwed","outputs":[{"name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
  {"stateMutability":"payable","type":"receive"}
];

// ============================================================
//  State
// ============================================================
let provider, signer, userAddress, contract, contractAddress, marketId;
let countdownTimer, refreshTimer;

const SEPOLIA_CHAIN_ID = "0xaa36a7"; // 11155111

const PHASE = { 0: "Open", 1: "Proposed", 2: "Settled" };

// ============================================================
//  Wallet
// ============================================================
async function connectWallet() {
  if (!window.ethereum) { alert("MetaMask not found — please install it from metamask.io"); return; }
  try {
    await window.ethereum.request({ method: "eth_requestAccounts" });

    // Switch to Sepolia if needed
    const chainId = await window.ethereum.request({ method: "eth_chainId" });
    if (chainId !== SEPOLIA_CHAIN_ID) {
      try {
        await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: SEPOLIA_CHAIN_ID }] });
      } catch(e) {
        await window.ethereum.request({ method: "wallet_addEthereumChain", params: [{
          chainId: SEPOLIA_CHAIN_ID, chainName: "Sepolia Testnet",
          rpcUrls: ["https://rpc.sepolia.org"],
          nativeCurrency: { name: "ETH", symbol: "ETH", decimals: 18 },
          blockExplorerUrls: ["https://sepolia.etherscan.io"]
        }]});
      }
    }

    provider    = new ethers.BrowserProvider(window.ethereum);
    signer      = await provider.getSigner();
    userAddress = await signer.getAddress();

    const btn = document.getElementById("connectBtn");
    btn.textContent = userAddress.slice(0,6) + "..." + userAddress.slice(-4);
    btn.classList.add("connected");

    log("statusLog", `Connected: ${userAddress}`, "ok");
    if (contract) updateUI();
  } catch(e) {
    log("statusLog", "Connection failed: " + e.message, "err");
  }
}

// ============================================================
//  Load Market
// ============================================================
async function loadMarket() {
  contractAddress = document.getElementById("contractAddr").value.trim();
  marketId        = parseInt(document.getElementById("marketIdInput").value);

  if (!ethers.isAddress(contractAddress)) { alert("Invalid contract address"); return; }
  if (!provider) {
    // Auto-connect read-only via Sepolia public RPC
    provider = new ethers.JsonRpcProvider("https://rpc.sepolia.org");
  }

  contract = new ethers.Contract(contractAddress, ABI, signer || provider);
  document.getElementById("marketCard").style.display = "block";
  await updateUI();

  clearInterval(refreshTimer);
  refreshTimer = setInterval(updateUI, 10000); // refresh every 10s
}

// ============================================================
//  Update UI from chain
// ============================================================
async function updateUI() {
  try {
    const m    = await contract.getMarket(marketId);
    const odds = await contract.getOdds(marketId);

    const phase       = Number(m.phase);
    const yesPool     = ethers.formatEther(m.yesPool);
    const noPool      = ethers.formatEther(m.noPool);
    const totalPot    = (parseFloat(yesPool) + parseFloat(noPool)).toFixed(5);
    const yesPct      = Number(odds.yesPct);
    const noPct       = Number(odds.noPct);
    const deadline    = Number(m.deadline);
    const now         = Math.floor(Date.now() / 1000);

    document.getElementById("mQuestion").textContent = m.question;
    document.getElementById("yesPool").textContent   = parseFloat(yesPool).toFixed(5) + " ETH";
    document.getElementById("noPool").textContent    = parseFloat(noPool).toFixed(5) + " ETH";
    document.getElementById("totalPot").textContent  = totalPot + " ETH";
    document.getElementById("oddsBar").style.width   = yesPct + "%";
    document.getElementById("yesPct").textContent    = yesPct + "%";
    document.getElementById("noPct").textContent     = noPct + "%";

    // Phase badge
    const badge = document.getElementById("phaseBadge");
    badge.textContent = PHASE[phase];
    badge.className   = "phase-badge phase-" + PHASE[phase].toLowerCase();

    // Countdown
    startCountdown(deadline, phase);

    // Panel visibility
    document.getElementById("betPanel").style.display     = phase === 0 ? "block" : "none";
    document.getElementById("auditPanel").style.display   = phase === 1 ? "block" : "none";
    document.getElementById("claimPanel").style.display   = phase === 2 ? "block" : "none";
    document.getElementById("outcomeBanner").style.display = phase === 2 ? "block" : "none";

    // Disable bet buttons after deadline
    const expired = now >= deadline;
    document.getElementById("btnYes").disabled = expired;
    document.getElementById("btnNo").disabled  = expired;

    // Outcome banner
    if (phase === 2) {
      const netPot = ethers.formatEther(m.potAtSettle - m.deciderFee);
      document.getElementById("outcomeTitle").textContent =
        "Outcome: " + (m.outcomeYes ? "YES ✓" : "NO ✓");
      document.getElementById("outcomeDetail").textContent =
        `Net pot distributed: ${parseFloat(netPot).toFixed(5)} ETH  |  ` +
        `Decider fee: ${parseFloat(ethers.formatEther(m.deciderFee)).toFixed(5)} ETH`;
    }

    // Auditor panel details
    if (phase === 1 && userAddress) {
      const yesAud = m.yesAuditor.toLowerCase();
      const noAud  = m.noAuditor.toLowerCase();
      const me     = userAddress.toLowerCase();
      const decider = m.finalDecider?.toLowerCase();

      let auditHTML = `Proposed outcome: <span>${m.outcomeYes ? "YES" : "NO"} (awaiting confirmation)</span><br>`;
      auditHTML += `YES auditor: <span>${m.yesAuditor}</span><br>`;
      auditHTML += `NO  auditor: <span>${m.noAuditor}</span><br>`;
      if (decider && decider !== "0x0000000000000000000000000000000000000000") {
        auditHTML += `Final decider: <span>${m.finalDecider}</span>`;
      }
      document.getElementById("auditInfo").innerHTML = auditHTML;

      const isAuditor = (me === yesAud || me === noAud);
      const isDecider = decider && me === decider;
      document.getElementById("btnAccept").style.display   = isAuditor ? "block" : "none";
      document.getElementById("btnReject").style.display   = isAuditor ? "block" : "none";
      document.getElementById("btnDecide").style.display   = isDecider ? "block" : "none";
      document.getElementById("btnDecideNo").style.display = isDecider ? "block" : "none";

      if (!isAuditor && !isDecider) {
        document.getElementById("auditInfo").innerHTML += "<br><span>Your wallet is not selected as an auditor or decider for this market.</span>";
      }
    }

    // Show fee withdrawal buttons if relevant
    if (phase === 2 && userAddress) {
      const creatorOwed  = await contract.creatorFeeOwed(userAddress);
      const deciderOwed  = await contract.deciderFeeOwed(userAddress);
      document.getElementById("btnWithdrawCreator").style.display = creatorOwed > 0n ? "block" : "none";
      document.getElementById("btnWithdrawDecider").style.display = deciderOwed > 0n ? "block" : "none";
    }

  } catch(e) {
    log("statusLog", "Error loading market: " + e.message, "err");
  }
}

// ============================================================
//  Countdown
// ============================================================
function startCountdown(deadline, phase) {
  clearInterval(countdownTimer);
  const el = document.getElementById("countdown");
  if (phase !== 0) { el.textContent = ""; return; }

  function tick() {
    const remaining = deadline - Math.floor(Date.now() / 1000);
    if (remaining <= 0) {
      el.textContent = "Betting closed — waiting for creator to propose outcome";
      clearInterval(countdownTimer);
      return;
    }
    const m = Math.floor(remaining / 60);
    const s = remaining % 60;
    el.textContent = `Betting closes in ${m}m ${String(s).padStart(2,"0")}s`;
  }
  tick();
  countdownTimer = setInterval(tick, 1000);
}

// ============================================================
//  Place Bet
// ============================================================
async function placeBet(isYes) {
  if (!signer) { alert("Connect your wallet first"); return; }
  const amtStr = document.getElementById("betAmount").value;
  const amt    = parseFloat(amtStr);
  if (!amt || amt <= 0) { alert("Enter a valid ETH amount"); return; }

  const btn = isYes ? document.getElementById("btnYes") : document.getElementById("btnNo");
  btn.disabled = true;

  try {
    log("statusLog", `Sending ${isYes ? "YES" : "NO"} bet of ${amt} ETH...`, "info");
    const c  = contract.connect(signer);
    const fn = isYes ? c.placeYes : c.placeNo;
    const tx = await fn(marketId, { value: ethers.parseEther(amtStr) });
    log("statusLog", `TX submitted → <a class="link" href="https://sepolia.etherscan.io/tx/${tx.hash}" target="_blank">${tx.hash.slice(0,18)}...</a>`, "info");
    await tx.wait();
    log("statusLog", `✓ Bet confirmed! You bet ${amt} ETH on ${isYes ? "YES" : "NO"}`, "ok");
    await updateUI();
  } catch(e) {
    log("statusLog", "Bet failed: " + (e.reason || e.message), "err");
  }
  btn.disabled = false;
}

// ============================================================
//  Auditor Vote
// ============================================================
async function castAuditorVote(accept) {
  if (!signer) { alert("Connect your wallet first"); return; }
  try {
    log("auditLog", `Voting: ${accept ? "ACCEPT" : "REJECT"} proposed outcome...`, "info");
    const tx = await contract.connect(signer).auditorVote(marketId, accept);
    log("auditLog", `TX → <a class="link" href="https://sepolia.etherscan.io/tx/${tx.hash}" target="_blank">${tx.hash.slice(0,18)}...</a>`, "info");
    await tx.wait();
    log("auditLog", `✓ Vote recorded`, "ok");
    await updateUI();
  } catch(e) {
    log("auditLog", "Vote failed: " + (e.reason || e.message), "err");
  }
}

// ============================================================
//  Final Decide
// ============================================================
async function castFinalDecide(outcomeYes) {
  if (!signer) { alert("Connect your wallet first"); return; }
  try {
    log("auditLog", `Final decision: ${outcomeYes ? "YES" : "NO"}...`, "info");
    const tx = await contract.connect(signer).finalDecide(marketId, outcomeYes);
    log("auditLog", `TX → <a class="link" href="https://sepolia.etherscan.io/tx/${tx.hash}" target="_blank">${tx.hash.slice(0,18)}...</a>`, "info");
    await tx.wait();
    log("auditLog", `✓ Market resolved by final decider`, "ok");
    await updateUI();
  } catch(e) {
    log("auditLog", "Decision failed: " + (e.reason || e.message), "err");
  }
}

// ============================================================
//  Claim Winnings
// ============================================================
async function claimWinnings() {
  if (!signer) { alert("Connect your wallet first"); return; }
  try {
    log("claimLog", "Claiming winnings...", "info");
    const tx = await contract.connect(signer).claim(marketId);
    log("claimLog", `TX → <a class="link" href="https://sepolia.etherscan.io/tx/${tx.hash}" target="_blank">${tx.hash.slice(0,18)}...</a>`, "info");
    const receipt = await tx.wait();
    log("claimLog", "✓ Winnings claimed!", "ok");
    await updateUI();
  } catch(e) {
    log("claimLog", "Claim failed: " + (e.reason || e.message), "err");
  }
}

// ============================================================
//  Withdraw Fees
// ============================================================
async function withdrawFees(type) {
  if (!signer) { alert("Connect your wallet first"); return; }
  try {
    log("claimLog", `Withdrawing ${type} fees...`, "info");
    const fn =
      type === "creator"  ? contract.connect(signer).withdrawCreatorFees() :
      type === "decider"  ? contract.connect(signer).withdrawDeciderFees() :
                            contract.connect(signer).withdrawCompanyFees();
    const tx = await fn;
    log("claimLog", `TX → <a class="link" href="https://sepolia.etherscan.io/tx/${tx.hash}" target="_blank">${tx.hash.slice(0,18)}...</a>`, "info");
    await tx.wait();
    log("claimLog", `✓ ${type} fees withdrawn`, "ok");
    await updateUI();
  } catch(e) {
    log("claimLog", "Withdrawal failed: " + (e.reason || e.message), "err");
  }
}

// ============================================================
//  Log helper
// ============================================================
function log(targetId, msg, type = "") {
  const el = document.getElementById(targetId);
  if (!el) return;
  const line = document.createElement("div");
  if (type) line.classList.add(type);
  line.innerHTML = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

// ============================================================
//  Auto-detect MetaMask account changes
// ============================================================
if (window.ethereum) {
  window.ethereum.on("accountsChanged", accounts => {
    if (accounts.length === 0) {
      document.getElementById("connectBtn").textContent = "Connect MetaMask";
      document.getElementById("connectBtn").classList.remove("connected");
      userAddress = null; signer = null;
    } else {
      connectWallet();
    }
  });
  window.ethereum.on("chainChanged", () => location.reload());
}
