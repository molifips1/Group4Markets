<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Group 4 Prediction Market</title><script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script><style>@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');:root{--bg:#0a0a0f;--surface:#111118;--border:#1e1e2e;--accent:#f0c040;--green:#3dffa0;--red:#ff5f6d;--muted:#444466;--text:#e8e8f0;--subtext:#8888aa}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.6}body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;opacity:0.4}.wrap{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:0 24px 80px}header{display:flex;align-items:center;justify-content:space-between;padding:28px 0 24px;border-bottom:1px solid var(--border);margin-bottom:48px}.logo{display:flex;align-items:baseline;gap:10px}.logo-mark{font-size:1.4rem;font-weight:800;color:var(--accent);letter-spacing:-0.03em}.logo-sub{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase}#connectBtn{font-family:'DM Mono',monospace;font-size:0.75rem;font-weight:500;padding:10px 20px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;transition:background 0.15s,color 0.15s}#connectBtn:hover{background:var(--accent);color:var(--bg)}#connectBtn.connected{border-color:var(--green);color:var(--green);font-size:0.65rem}.tabs{display:flex;gap:0;margin-bottom:36px;border-bottom:1px solid var(--border)}.tab-btn{font-family:'DM Mono',monospace;font-size:0.75rem;font-weight:600;padding:16px 24px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--subtext);cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;transition:all 0.15s}.tab-btn:hover{color:var(--text)}.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}.tab-content{display:none}.tab-content.active{display:block}.bets-list{display:flex;flex-direction:column;gap:16px;margin-bottom:36px}.bet-item{background:var(--surface);border:1px solid var(--border);padding:18px 20px;cursor:pointer;transition:all 0.15s;display:flex;justify-content:space-between;align-items:center;gap:16px}.bet-item:hover{border-color:var(--accent);background:rgba(240,192,64,0.05)}.bet-item-left{flex:1}.bet-item-question{font-size:0.95rem;font-weight:600;line-height:1.3;margin-bottom:8px}.bet-item-meta{display:flex;gap:16px;font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--subtext)}.bet-item-right{display:flex;align-items:center;gap:12px}.bet-status{font-family:'DM Mono',monospace;font-size:0.65rem;font-weight:600;padding:6px 10px;border:1px solid;white-space:nowrap}.status-open{border-color:var(--green);color:var(--green)}.status-proposed{border-color:var(--accent);color:var(--accent)}.status-resolved{border-color:var(--muted);color:var(--muted)}.bet-odds{display:flex;gap:12px;text-align:center;font-size:0.8rem;font-weight:700;min-width:80px}.odds-yes{color:var(--green)}.odds-no{color:var(--red)}.empty-message{text-align:center;padding:40px 20px;color:var(--subtext)}#marketCard{display:none}.market-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;gap:16px;flex-wrap:wrap}.market-question{font-size:1.55rem;font-weight:700;line-height:1.2;letter-spacing:-0.02em;max-width:580px}.phase-badge{font-family:'DM Mono',monospace;font-size:0.65rem;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;padding:6px 14px;border:1px solid;white-space:nowrap;margin-top:4px}.phase-open{border-color:var(--green);color:var(--green)}.phase-proposed{border-color:var(--accent);color:var(--accent)}.phase-settled{border-color:var(--muted);color:var(--muted)}.odds-block{margin-bottom:32px}.odds-labels{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--subtext);margin-bottom:8px}.odds-bar{height:6px;background:var(--border);overflow:hidden;position:relative}.odds-bar-yes{height:100%;background:var(--green);transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}.odds-pct{display:flex;justify-content:space-between;margin-top:8px}.odds-pct span{font-size:1.6rem;font-weight:800;letter-spacing:-0.04em}.yes-pct{color:var(--green)}.no-pct{color:var(--red)}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin-bottom:32px}.stat{background:var(--surface);padding:18px 20px;display:flex;flex-direction:column;gap:4px}.stat-label{font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted)}.stat-value{font-size:1.05rem;font-weight:700;letter-spacing:-0.02em}.action-panel{background:var(--surface);border:1px solid var(--border);padding:28px 32px;margin-bottom:24px}.action-title{font-size:0.65rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);margin-bottom:20px}.bet-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}.bet-input-wrap{flex:1;min-width:140px}.bet-input-wrap label{display:block;font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--subtext);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}.bet-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:0.85rem;padding:10px 14px;outline:none;transition:border-color 0.15s}.bet-input:focus{border-color:var(--accent)}.btn-bet{font-family:'DM Mono',monospace;font-size:0.75rem;font-weight:500;padding:11px 18px;border:none;cursor:pointer;letter-spacing:0.06em;white-space:nowrap;transition:opacity 0.15s}.btn-yes{background:var(--green);color:var(--bg)}.btn-yes:hover:not(:disabled){opacity:0.85}.btn-no{background:var(--red);color:var(--bg)}.btn-no:hover:not(:disabled){opacity:0.85}.btn-bet:disabled{opacity:0.4;cursor:not-allowed}.log-section{margin-bottom:20px}.log-title{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}.log{background:var(--bg);border:1px solid var(--border);padding:12px;max-height:120px;overflow-y:auto;font-family:'DM Mono',monospace;font-size:0.7rem;line-height:1.4}.log div{padding:3px 0}.log .ok{color:var(--green)}.log .info{color:var(--accent)}.log .err{color:var(--red)}.back-btn{font-family:'DM Mono',monospace;font-size:0.75rem;font-weight:500;padding:10px 20px;border:1px solid var(--border);background:var(--surface);color:var(--accent);cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:24px;transition:all 0.15s}.back-btn:hover{border-color:var(--accent);background:rgba(240,192,64,0.1)}@media (max-width:640px){.bet-item{flex-direction:column;align-items:flex-start}.bet-item-right{width:100%;justify-content:space-between}.stats{grid-template-columns:1fr}.btn-bet{width:100%}}</style></head><body><div class="wrap"><header><div class="logo"><div class="logo-mark">⬢</div><div class="logo-sub">Group 4<br>Prediction Market</div></div><button id="connectBtn">Connect MetaMask</button></header><div class="tabs"><button class="tab-btn active" onclick="switchTab('browse')">Browse Markets</button><button class="tab-btn" onclick="switchTab('detail')">Market Details</button></div><div id="browseTab" class="tab-content active"><div class="bets-list" id="betsList"></div><div id="emptyMessage" class="empty-message">Loading markets from blockchain...</div></div><div id="detailTab" class="tab-content"><button class="back-btn" onclick="switchTab('browse')">← Back to Browse</button><div id="marketCard"><div class="market-header"><div class="market-question" id="marketQuestion"></div><div class="phase-badge" id="phaseBadge"></div></div><div class="odds-block"><div class="odds-labels"><span>YES</span><span>NO</span></div><div class="odds-bar"><div class="odds-bar-yes" id="oddsYes" style="width:50%"></div></div><div class="odds-pct"><span class="yes-pct" id="yesPct">50%</span><span class="no-pct" id="noPct">50%</span></div></div><div class="stats"><div class="stat"><div class="stat-label">Total Pot</div><div class="stat-value" id="totalPot">0 ETH</div></div><div class="stat"><div class="stat-label">Betting Closes</div><div class="stat-value" id="countdown">—</div></div><div class="stat"><div class="stat-label">Your Position</div><div class="stat-value" id="yourPosition">—</div></div></div><div class="action-panel" id="bettingPanel"><div class="action-title">Place a Bet</div><div class="bet-row"><div class="bet-input-wrap"><label>Amount (ETH)</label><input type="number" id="betAmount" placeholder="0.01" step="0.001"></div><button class="btn-bet btn-yes" id="btnYes" onclick="placeBet(true)">Bet YES</button><button class="btn-bet btn-no" id="btnNo" onclick="placeBet(false)">Bet NO</button></div></div><div class="log-section"><div class="log-title">Status</div><div class="log" id="statusLog"></div></div></div></div></div><script>const RPC_URL="https://sepolia.infura.io/v3/f88f43b3adbb4bd398b9465e5d931e4d";const CONTRACT_ADDRESS="0xb215b5153dafb7Ea3BFc3eaA903E472BD21579F4";const CONTRACT_ABI=["function getMarketCount() public view returns (uint256)","function markets(uint256 id) public view returns (address, string, uint256, uint256, uint256, uint8, uint256, uint256, uint256, uint256, bool, address, address, address)","function userBets(address user, uint256 marketId) public view returns (uint256, uint256)","function placeYes(uint256 marketId) public payable","function placeNo(uint256 marketId) public payable","function claim(uint256 marketId) public"];let provider,signer,contract,userAddress;let allMarkets=[];let marketId=null;let countdownTimer=null;document.addEventListener("DOMContentLoaded",async ()=>{console.log("Page loaded, starting initialization");if(window.ethereum){window.ethereum.on("accountsChanged",e=>{if(0===e.length){document.getElementById("connectBtn").textContent="Connect MetaMask";document.getElementById("connectBtn").classList.remove("connected");userAddress=null;signer=null;}else{connectWallet();}});} document.getElementById("connectBtn").onclick=connectWallet;await loadAllMarkets();});async function connectWallet(){try{console.log("Connecting wallet...");const e=await window.ethereum.request({method:"eth_requestAccounts"});userAddress=e[0];provider=new ethers.BrowserProvider(window.ethereum);signer=await provider.getSigner();contract=new ethers.Contract(CONTRACT_ADDRESS,CONTRACT_ABI,provider);const t=document.getElementById("connectBtn");t.textContent=userAddress.slice(0,6)+"..."+userAddress.slice(-4);t.classList.add("connected");log("statusLog","✓ Connected: "+userAddress,"ok");await renderBetsList();}catch(e){console.error("Connection error:",e);log("statusLog","Connection failed: "+e.message,"err");}}async function loadAllMarkets(){try{console.log("Connecting to RPC...");provider=new ethers.JsonRpcProvider(RPC_URL);contract=new ethers.Contract(CONTRACT_ADDRESS,CONTRACT_ABI,provider);console.log("Getting market count...");const e=await contract.getMarketCount();const t=parseInt(e.toString());console.log("Market count:",t);log("statusLog",`Found ${t} markets, loading details...`,"info");allMarkets=[];if(t===0){log("statusLog","No markets found on contract","info");document.getElementById("emptyMessage").textContent="No markets found";document.getElementById("emptyMessage").style.display="block";return;}for(let n=0;n<t;n++){try{console.log(`Loading market ${n}...`);const e=await contract.markets(n);let a={yesAmount:0n,noAmount:0n};if(userAddress){a=await contract.userBets(userAddress,n);}allMarkets.push({id:n,creator:e[0],question:e[1],creationTime:e[2],deadline:e[3],phaseEndTime:e[4],phase:e[5],potYes:e[6],potNo:e[7],potAtSettle:e[8],deciderFee:e[9],outcomeYes:e[10],yesAuditor:e[11],noAuditor:e[12],finalDecider:e[13],userYes:a[0],userNo:a[1]});}catch(e){console.error(`Error loading market ${n}:`,e);}}console.log("Markets loaded:",allMarkets);log("statusLog",`✓ Loaded ${allMarkets.length} markets`,"ok");await renderBetsList();}catch(e){console.error("Load error:",e);log("statusLog","Error loading markets: "+e.message,"err");document.getElementById("emptyMessage").textContent="Error loading markets: "+e.message;document.getElementById("emptyMessage").style.display="block";}}async function renderBetsList(){const e=document.getElementById("betsList");const t=document.getElementById("emptyMessage");if(allMarkets.length===0){e.innerHTML="";t.textContent="No markets found";t.style.display="block";return;}t.style.display="none";e.innerHTML="";const n=[...allMarkets].sort((e,t)=>{const n=Math.floor(Date.now()/1000);const a=e.phase<2&&e.deadline>n;const i=t.phase<2&&t.deadline>n;return i-a;});n.forEach(t=>{const a=document.createElement("div");a.className="bet-item";a.onclick=()=>selectMarket(t.id);const i=Math.floor(Date.now()/1000);const s=t.potYes+t.potNo;const c=s>0?(Number(t.potYes)/Number(s)*100).toFixed(0):50;const o=100-c;let r="Open";let l="status-open";if(t.phase===2){r="Resolved";l="status-resolved";}else if(t.phase===1){r="Proposed";l="status-proposed";}let d="Closed";if(t.phase<2&&t.deadline>i){const e=t.deadline-i;d=`${Math.floor(e/86400)}d ${Math.floor((e%86400)/3600)}h left`;}const u=ethers.formatEther(s);a.innerHTML=`<div class="bet-item-left"><div class="bet-item-question">${t.question}</div><div class="bet-item-meta"><span>💰 ${parseFloat(u).toFixed(3)} ETH</span><span>⏱ ${d}</span></div></div><div class="bet-item-right"><div class="bet-odds"><span class="odds-yes">${c}%</span><span class="odds-no">${o}%</span></div><div class="bet-status ${l}">${r}</div></div>`;e.appendChild(a);});}function selectMarket(e){marketId=e;updateUI();switchTab("detail");}function switchTab(e){document.querySelectorAll(".tab-content").forEach(e=>e.classList.remove("active"));document.querySelectorAll(".tab-btn").forEach(e=>e.classList.remove("active"));if(e==="browse"){document.getElementById("browseTab").classList.add("active");document.querySelector('[onclick="switchTab(\'browse\')"]').classList.add("active");}else{document.getElementById("detailTab").classList.add("active");document.querySelector('[onclick="switchTab(\'detail\')"]').classList.add("active");}}async function updateUI(){if(marketId===null)return;try{if(!signer){provider=new ethers.JsonRpcProvider(RPC_URL);contract=new ethers.Contract(CONTRACT_ADDRESS,CONTRACT_ABI,provider);}const e=allMarkets.find(e=>e.id===marketId);if(!e)return;document.getElementById("marketCard").style.display="block";document.getElementById("marketQuestion").textContent=e.question;const t=Math.floor(Date.now()/1000);const n=e.phase;const a=e.deadline;const i=document.getElementById("phaseBadge");i.textContent=n===2?"SETTLED":n===1?"PROPOSED":"OPEN";i.className=n===2?"phase-badge phase-settled":n===1?"phase-badge phase-proposed":"phase-badge phase-open";const s=e.potYes+e.potNo;const c=s>0?Number(e.potYes)/Number(s):0.5;document.getElementById("oddsYes").style.width=(c*100)+"%";document.getElementById("yesPct").textContent=(c*100).toFixed(1)+"%";document.getElementById("noPct").textContent=((1-c)*100).toFixed(1)+"%";const o=ethers.formatEther(s);document.getElementById("totalPot").textContent=parseFloat(o).toFixed(5)+" ETH";const r=ethers.formatEther(e.userYes);const l=ethers.formatEther(e.userNo);let d="—";if(e.userYes>0n)d=parseFloat(r).toFixed(3)+" ETH on YES";if(e.userNo>0n)d=parseFloat(l).toFixed(3)+" ETH on NO";document.getElementById("yourPosition").textContent=d;startCountdown(a,n);const u=t>=a;document.getElementById("bettingPanel").style.display=n===0&&!u?"block":"none";document.getElementById("btnYes").disabled=u;document.getElementById("btnNo").disabled=u;}catch(e){console.error("Update error:",e);log("statusLog","Error: "+e.message,"err");}}function startCountdown(e,t){clearInterval(countdownTimer);const n=document.getElementById("countdown");if(t!==0){n.textContent="—";return;}function a(){const i=t-Math.floor(Date.now()/1000);if(i<=0){n.textContent="Betting closed";clearInterval(countdownTimer);return;}const s=Math.floor(i/60);n.textContent=`${s}m ${String(i%60).padStart(2,"0")}s`;}a();countdownTimer=setInterval(a,1000);}async function placeBet(e){if(!signer)return alert("Connect your wallet first");const t=document.getElementById("betAmount").value;if(!t||parseFloat(t)<=0)return alert("Enter a valid ETH amount");const n=e?document.getElementById("btnYes"):document.getElementById("btnNo");n.disabled=true;try{log("statusLog",`Sending ${e?"YES":"NO"} bet of ${parseFloat(t)} ETH...`,"info");const a=contract.connect(signer);const i=e?a.placeYes:a.placeNo;const s=await i(marketId,{value:ethers.parseEther(t)});log("statusLog",`TX: ${s.hash.slice(0,18)}...`,"info");await s.wait();log("statusLog","✓ Bet confirmed!","ok");await loadAllMarkets();updateUI();document.getElementById("betAmount").value="";}catch(e){log("statusLog","Bet failed: "+(e.reason||e.message),"err");}n.disabled=false;}function log(e,t,n=""){const a=document.getElementById(e);if(!a)return;const i=document.createElement("div");i.classList.add(n);i.innerHTML=t;a.appendChild(i);a.scrollTop=a.scrollHeight;console.log(t);}</script></body></html>
