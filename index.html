<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group 4 Prediction Market</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');

:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --border: #1e1e2e;
  --accent: #f0c040;
  --green: #3dffa0;
  --red: #ff5f6d;
  --muted: #444466;
  --text: #e8e8f0;
  --subtext: #8888aa;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

.wrap {
  position: relative;
  z-index: 1;
  max-width: 880px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 0 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 48px;
  flex-wrap: wrap;
  gap: 16px;
}

.logo {
  display: flex;
  align-items: baseline;
  gap: 10px;
}

.logo-mark {
  font-size: 1.4rem;
  font-weight: 800;
  color: var(--accent);
}

.logo-sub {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.header-actions {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}

#connectBtn {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  font-weight: 500;
  padding: 10px 20px;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: all 0.15s;
}

#connectBtn:hover {
  background: var(--accent);
  color: var(--bg);
}

#connectBtn.connected {
  border-color: var(--green);
  color: var(--green);
}

.setup-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 20px;
  margin-bottom: 24px;
  border-radius: 6px;
}

.setup-row {
  display: flex;
  gap: 12px;
  align-items: flex-end;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.field {
  flex: 1;
  min-width: 150px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.field label {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--subtext);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.field input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  padding: 10px 14px;
  outline: none;
  border-radius: 4px;
}

.field input:focus {
  border-color: var(--accent);
}

.btn-load {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  font-weight: 500;
  padding: 11px 24px;
  background: var(--accent);
  color: var(--bg);
  border: none;
  cursor: pointer;
  border-radius: 4px;
  letter-spacing: 0.06em;
  transition: opacity 0.15s;
}

.btn-load:hover {
  opacity: 0.85;
}

.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 36px;
  border-bottom: 1px solid var(--border);
}

.tab-btn {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 16px 24px;
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--subtext);
  cursor: pointer;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: all 0.15s;
}

.tab-btn:hover {
  color: var(--text);
}

.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

.bets-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.bet-item {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 18px 20px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  border-radius: 6px;
}

.bet-item:hover {
  border-color: var(--accent);
  background: rgba(240, 192, 64, 0.05);
}

.bet-item-left {
  flex: 1;
}

.bet-item-question {
  font-size: 0.95rem;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 8px;
}

.bet-item-meta {
  display: flex;
  gap: 16px;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--subtext);
}

.bet-item-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.bet-status {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 6px 10px;
  border: 1px solid;
  white-space: nowrap;
  border-radius: 4px;
}

.status-open {
  border-color: var(--green);
  color: var(--green);
}

.status-proposed {
  border-color: var(--accent);
  color: var(--accent);
}

.status-resolved {
  border-color: var(--muted);
  color: var(--muted);
}

.bet-odds {
  display: flex;
  gap: 12px;
  text-align: center;
  font-size: 0.8rem;
  font-weight: 700;
  min-width: 80px;
}

.odds-yes {
  color: var(--green);
}

.odds-no {
  color: var(--red);
}

.empty-message {
  text-align: center;
  padding: 40px 20px;
  color: var(--subtext);
}

.log {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 12px;
  max-height: 200px;
  overflow-y: auto;
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  line-height: 1.4;
  border-radius: 4px;
  margin-top: 12px;
}

.log div {
  padding: 3px 0;
}

.log .ok {
  color: var(--green);
}

.log .info {
  color: var(--accent);
}

.log .err {
  color: var(--red);
}

.market-card {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 24px;
  border-radius: 6px;
  margin-top: 24px;
}

.market-question {
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 16px;
}

.market-stat {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
}

.market-stat:last-child {
  border-bottom: none;
}

.stat-label {
  color: var(--subtext);
  font-size: 0.85rem;
}

.stat-value {
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  color: var(--green);
}

.back-btn {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  font-weight: 500;
  padding: 10px 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--accent);
  cursor: pointer;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 24px;
  transition: all 0.15s;
  border-radius: 4px;
}

.back-btn:hover {
  border-color: var(--accent);
  background: rgba(240, 192, 64, 0.1);
}

@media (max-width: 640px) {
  .bet-item {
    flex-direction: column;
    align-items: flex-start;
  }

  .bet-item-right {
    width: 100%;
    justify-content: space-between;
  }
}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="logo">
      <div class="logo-mark">⬢</div>
      <div class="logo-sub">Group 4<br>Prediction Market</div>
    </div>
    <div class="header-actions">
      <button id="connectBtn">Connect MetaMask</button>
    </div>
  </header>

  <div class="setup-panel">
    <div class="setup-row">
      <div class="field" style="flex: 2;">
        <label>Contract Address</label>
        <input type="text" id="contractAddress" placeholder="0x..." value="0xb215b5153dafb7Ea3BFc3eaA903E472BD21579F4">
      </div>
      <button class="btn-load" onclick="loadMarkets()">Load Markets</button>
    </div>
    <div class="log" id="statusLog"></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('active')">🎯 Active</button>
    <button class="tab-btn" onclick="switchTab('history')">📊 Past</button>
  </div>

  <div id="activeTab" class="tab-content active">
    <div class="bets-list" id="activeBetsList"></div>
    <div id="activeBetsEmpty" class="empty-message" style="display:none;">No active bets</div>
  </div>

  <div id="historyTab" class="tab-content">
    <div class="bets-list" id="pastBetsList"></div>
    <div id="pastBetsEmpty" class="empty-message" style="display:none;">No past bets</div>
  </div>

  <button class="back-btn" onclick="switchTab('active')" style="display:none;" id="backBtn">← Back</button>

  <div class="market-card" id="marketCard">
    <div class="market-question" id="marketQuestion"></div>
    <div class="market-stat">
      <span class="stat-label">Total Pool</span>
      <span class="stat-value" id="marketPool">0 ETH</span>
    </div>
    <div class="market-stat">
      <span class="stat-label">YES / NO</span>
      <span class="stat-value" id="marketOdds">50% / 50%</span>
    </div>
    <div class="market-stat">
      <span class="stat-label">Status</span>
      <span class="stat-value" id="marketStatus">Open</span>
    </div>
  </div>
</div>

<script>
const SEPOLIA_RPC = "https://sepolia.infura.io/v3/f88f43b3adbb4bd398b9465e5d931e4d";

const CONTRACT_ABI = [
  "function getMarketCount() public view returns (uint256)",
  "function markets(uint256 id) public view returns (address creator, string memory question, uint256 creationTime, uint256 deadline, uint256 phaseEndTime, uint8 phase, uint256 potYes, uint256 potNo, uint256 potAtSettle, uint256 deciderFee, bool outcomeYes, address yesAuditor, address noAuditor, address finalDecider)",
  "function userBets(address user, uint256 marketId) public view returns (uint256 yesAmount, uint256 noAmount)",
  "function placeYes(uint256 marketId) public payable",
  "function placeNo(uint256 marketId) public payable",
  "function claim(uint256 marketId) public"
];

let provider, signer, contract;
let allMarkets = [];
let selectedMarketId = null;

document.getElementById("connectBtn").onclick = connectWallet;

async function connectWallet() {
  try {
    const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
    const btn = document.getElementById("connectBtn");
    btn.textContent = accounts[0].slice(0, 6) + "..." + accounts[0].slice(-4);
    btn.classList.add("connected");
    log("✓ Wallet connected", "ok");
  } catch(e) {
    log("Connection failed: " + e.message, "err");
  }
}

async function loadMarkets() {
  const contractAddr = document.getElementById("contractAddress").value.trim();
  
  if (!contractAddr || !contractAddr.startsWith("0x")) {
    log("Invalid contract address", "err");
    return;
  }

  try {
    log("Connecting to RPC...", "info");
    provider = new ethers.JsonRpcProvider(SEPOLIA_RPC);
    contract = new ethers.Contract(contractAddr, CONTRACT_ABI, provider);

    log("Fetching market count...", "info");
    const count = await contract.getMarketCount();
    const countNum = parseInt(count.toString());
    
    log(`Found ${countNum} markets, loading...`, "info");

    allMarkets = [];
    for (let i = 0; i < countNum; i++) {
      try {
        const market = await contract.markets(i);
        allMarkets.push({
          id: i,
          creator: market[0],
          question: market[1],
          deadline: market[3],
          phase: market[5],
          potYes: market[6],
          potNo: market[7]
        });
        log(`✓ Market ${i} loaded`, "ok");
      } catch(e) {
        log(`✗ Market ${i} error`, "err");
      }
    }

    log(`✓ All ${allMarkets.length} markets loaded!`, "ok");
    renderBets();
  } catch(e) {
    log("Error: " + e.message, "err");
  }
}

function renderBets() {
  const now = Math.floor(Date.now() / 1000);
  
  const active = allMarkets.filter(m => m.phase < 2 && m.deadline > now);
  const past = allMarkets.filter(m => m.phase === 2 || (m.deadline <= now && m.phase < 2));

  renderList(active, "activeBetsList", "activeBetsEmpty");
  renderList(past, "pastBetsList", "pastBetsEmpty");
}

function renderList(bets, listId, emptyId) {
  const list = document.getElementById(listId);
  const empty = document.getElementById(emptyId);

  if (bets.length === 0) {
    list.innerHTML = "";
    empty.style.display = "block";
    return;
  }

  empty.style.display = "none";
  list.innerHTML = "";

  bets.forEach(m => {
    const item = document.createElement("div");
    item.className = "bet-item";
    item.onclick = () => selectMarket(m.id);

    const total = m.potYes + m.potNo;
    const yesP = total > 0 ? (Number(m.potYes) / Number(total) * 100).toFixed(0) : 50;
    const noP = 100 - yesP;

    const now = Math.floor(Date.now() / 1000);
    let status = "Open";
    let statusClass = "status-open";
    if (m.phase === 2) {
      status = "Resolved";
      statusClass = "status-resolved";
    } else if (m.phase === 1) {
      status = "Proposed";
      statusClass = "status-proposed";
    }

    let time = "Closed";
    if (m.phase < 2 && m.deadline > now) {
      const remaining = m.deadline - now;
      const days = Math.floor(remaining / 86400);
      const hours = Math.floor((remaining % 86400) / 3600);
      time = `${days}d ${hours}h`;
    }

    const pool = ethers.formatEther(total);

    item.innerHTML = `
      <div class="bet-item-left">
        <div class="bet-item-question">${m.question}</div>
        <div class="bet-item-meta">
          <span>💰 ${parseFloat(pool).toFixed(3)} ETH</span>
          <span>⏱ ${time}</span>
        </div>
      </div>
      <div class="bet-item-right">
        <div class="bet-odds">
          <span class="odds-yes">${yesP}%</span>
          <span class="odds-no">${noP}%</span>
        </div>
        <div class="bet-status ${statusClass}">${status}</div>
      </div>
    `;
    
    list.appendChild(item);
  });
}

function selectMarket(id) {
  const m = allMarkets[id];
  document.getElementById("marketQuestion").textContent = m.question;
  document.getElementById("marketPool").textContent = ethers.formatEther(m.potYes + m.potNo).slice(0, 8) + " ETH";
  
  const total = m.potYes + m.potNo;
  const yesP = total > 0 ? (Number(m.potYes) / Number(total) * 100).toFixed(1) : 50;
  document.getElementById("marketOdds").textContent = `${yesP}% / ${(100 - yesP).toFixed(1)}%`;
  
  const phaseNames = ["Open", "Proposed", "Resolved"];
  document.getElementById("marketStatus").textContent = phaseNames[m.phase];
  
  document.getElementById("marketCard").style.display = "block";
  document.getElementById("backBtn").style.display = "block";
}

function switchTab(tab) {
  document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(el => el.classList.remove("active"));
  
  if (tab === "active") {
    document.getElementById("activeTab").classList.add("active");
    document.querySelector('[onclick="switchTab(\'active\')"]').classList.add("active");
    document.getElementById("marketCard").style.display = "none";
    document.getElementById("backBtn").style.display = "none";
  } else {
    document.getElementById("historyTab").classList.add("active");
    document.querySelector('[onclick="switchTab(\'history\')"]').classList.add("active");
    document.getElementById("marketCard").style.display = "none";
    document.getElementById("backBtn").style.display = "none";
  }
}

function log(msg, type) {
  const el = document.getElementById("statusLog");
  const line = document.createElement("div");
  line.className = type;
  line.innerHTML = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
  console.log(msg);
}

log("Enter contract address above and click Load Markets", "info");
</script>

</body>
</html>
