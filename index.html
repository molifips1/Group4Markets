<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Group4Market — Prediction Markets</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap');

  :root {
    --bg: #0a0b0f; --surface: #111318; --border: #1e2029; --text: #e8eaf0;
    --muted: #6b7080; --yes: #00d98b; --no: #ff4d6d; --accent: #7c6cff;
  }

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
  header { position: sticky; top: 0; background: rgba(10,11,15,0.8); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
  .logo { font-family: 'Space Mono', monospace; font-weight: 700; color: var(--accent); }
  .main { max-width: 1000px; margin: 0 auto; padding: 2rem; }
  
  #markets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
  .question { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem; font-family: 'Space Mono'; font-size: 0.8rem; }
  .stat-item { background: var(--bg); padding: 0.5rem; border-radius: 6px; text-align: center; }
  
  .bet-btn { width: 100%; padding: 0.6rem; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s; }
  .yes { background: var(--yes); color: #003b26; }
  .no { background: var(--no); color: #400010; }
  .bet-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  
  input { background: var(--bg); border: 1px solid var(--border); color: white; padding: 0.5rem; width: 100%; border-radius: 6px; margin-bottom: 0.5rem; box-sizing: border-box; }
  .user-bet { font-size: 0.75rem; color: var(--accent); margin-bottom: 0.5rem; font-family: 'Space Mono'; }
</style>
</head>
<body>

<header>
  <div class="logo">Group4Market</div>
  <button id="connect-btn" class="bet-btn" style="width:auto; background:var(--surface); color:white; border:1px solid var(--accent)" onclick="connect()">Connect Wallet</button>
</header>

<main class="main">
  <div id="markets-grid">
    <p>Loading markets from blockchain...</p>
  </div>
</main>

<script>
// 1. SETTINGS FROM YOUR BACKEND
const CONTRACT_ADDRESS = "0x8DA1A881D4eA5a8C273aA6877987ef505a097f4a";
const ABI = [
  "function marketCount() view returns (uint256)",
  "function getMarket(uint256) view returns (string question, address creator, uint256 deadline, uint8 phase, uint256 yesPool, uint256 noPool, bool resolved, bool outcomeYes, address yesAuditor, address noAuditor, address finalDecider, uint256 deciderFee, uint256 potAtSettle)",
  "function placeYes(uint256) payable",
  "function placeNo(uint256) payable",
  "function yesBets(uint256, address) view returns (uint256)",
  "function noBets(uint256, address) view returns (uint256)"
];

let provider, signer, address;

// 2. AUTOMATIC INITIALIZATION
window.onload = async () => {
    // Connect to Sepolia (read-only by default)
    provider = new ethers.JsonRpcProvider("https://sepolia.infura.io/v3/f88f43b3adbb4bd398b9465e5d931e4d");
    await refreshMarkets();
};

async function connect() {
    if (!window.ethereum) return alert("Please install MetaMask");
    const browserProvider = new ethers.BrowserProvider(window.ethereum);
    signer = await browserProvider.getSigner();
    address = await signer.getAddress();
    document.getElementById('connect-btn').innerText = address.slice(0,6)+"..."+address.slice(-4);
    await refreshMarkets();
}

async function refreshMarkets() {
    const grid = document.getElementById('markets-grid');
    const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);
    
    try {
        const count = await contract.marketCount();
        grid.innerHTML = "";
        
        for (let i = 0; i < count; i++) {
            const m = await contract.getMarket(i);
            let myYes = 0n, myNo = 0n;
            
            // Auto-fetch bets if user is connected
            if (address) {
                myYes = await contract.yesBets(i, address);
                myNo = await contract.noBets(i, address);
            }

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="question">${m.question}</div>
                <div class="stats">
                    <div class="stat-item">YES: ${ethers.formatEther(m.yesPool)} ETH</div>
                    <div class="stat-item">NO: ${ethers.formatEther(m.noPool)} ETH</div>
                </div>
                ${(myYes > 0 || myNo > 0) ? `<div class="user-bet">Your Bet: ${ethers.formatEther(myYes)} YES | ${ethers.formatEther(myNo)} NO</div>` : ''}
                <input type="number" step="0.01" placeholder="Amount ETH" id="amt-${i}">
                <div style="display:flex; gap:0.5rem">
                    <button class="bet-btn yes" onclick="bet(${i}, true)">Bet YES</button>
                    <button class="bet-btn no" onclick="bet(${i}, false)">Bet NO</button>
                </div>
            `;
            grid.appendChild(card);
        }
    } catch (e) {
        grid.innerHTML = "<p>Error: Could not sync with contract. Check your Sepolia connection.</p>";
    }
}

async function bet(id, isYes) {
    if (!signer) return connect();
    const val = document.getElementById(`amt-${id}`).value;
    if (!val) return alert("Enter amount");
    
    const userContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
    try {
        const tx = isYes ? 
            await userContract.placeYes(id, {value: ethers.parseEther(val)}) :
            await userContract.placeNo(id, {value: ethers.parseEther(val)});
        await tx.wait();
        await refreshMarkets(); // Auto-refresh after bet
    } catch (e) {
        alert("Transaction failed: " + e.message);
    }
}
</script>
</body>
</html>
