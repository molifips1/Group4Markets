<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Group4Market — Ultimate Auto-Sync</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap');
  :root { --bg: #0a0b0f; --surface: #111318; --border: #1e2029; --text: #e8eaf0; --accent: #7c6cff; --yes: #00d98b; --no: #ff4d6d; --muted: #6b7080; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
  header { position: sticky; top: 0; background: rgba(10,11,15,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 2.5rem 4rem; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
  .logo-container { display: flex; flex-direction: column; }
  .logo { font-family: 'Space Mono', monospace; font-weight: 700; color: var(--accent); font-size: 4rem; letter-spacing: -4px; line-height: 0.9; margin: 0; }
  .network-tag { font-family: 'Space Mono', monospace; font-size: 1rem; color: #ff9f43; text-transform: uppercase; margin-top: 8px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 10px; height: 10px; background: #ff9f43; border-radius: 50%; box-shadow: 0 0 10px #ff9f43; animation: pulse 2s infinite; }
  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
  .main { max-width: 1400px; margin: 0 auto; padding: 2rem; }
  .discovery-bar { background: #000; padding: 15px 25px; border-radius: 12px; font-family: 'Space Mono'; font-size: 0.8rem; color: var(--muted); margin-bottom: 2rem; border-left: 4px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
  .category-header { font-size: 2rem; font-weight: 700; margin: 4rem 0 1.5rem; display: flex; align-items: center; gap: 15px; border-left: 6px solid var(--accent); padding-left: 20px; }
  .count-pill { background: var(--surface); border: 1px solid var(--border); font-size: 1rem; padding: 4px 15px; border-radius: 30px; color: var(--accent); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 2.5rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 2.5rem; position: relative; transition: 0.3s; border-top: 6px solid var(--muted); }
  .card.active { border-top-color: var(--yes); }
  .question { font-size: 1.6rem; font-weight: 600; margin-bottom: 1.5rem; line-height: 1.3; }
  .stats-row { display: flex; gap: 15px; margin-bottom: 2rem; }
  .pool { flex: 1; background: var(--bg); padding: 15px; border-radius: 14px; border: 1px solid var(--border); text-align: center; }
  .pool .label { display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
  .pool .val { font-family: 'Space Mono'; font-weight: 700; font-size: 1.2rem; }
  .user-position { background: rgba(124, 108, 255, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 12px; border-radius: 12px; font-size: 0.9rem; margin-bottom: 1.5rem; font-family: 'Space Mono'; text-align: center; }
  .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-family: 'Space Mono'; font-size: 1rem; transition: 0.2s; }
  .btn-connect { width: auto; background: var(--accent); color: white; padding: 12px 30px; }
  .btn-yes { background: var(--yes); color: #003b26; margin-bottom: 10px; }
  .btn-no { background: var(--no); color: white; }
  input { background: var(--bg); border: 1px solid var(--border); color: white; padding: 14px; width: 100%; border-radius: 10px; box-sizing: border-box; margin-bottom: 12px; font-family: 'Space Mono'; font-size: 1rem; }
</style>
</head>
<body>

<header>
  <div class="logo-container">
    <h1 class="logo">Group4Market</h1>
    <div class="network-tag"><span class="dot"></span> Sepolia Live Chain</div>
  </div>
  <button id="connect-btn" class="btn btn-connect" onclick="connect()">Connect Wallet</button>
</header>

<main class="main">
  <div class="discovery-bar">
    <span id="contract-status">🔍 Searching for your latest contract deployment...</span>
    <span id="target-addr" style="color:var(--accent); text-decoration: underline;"></span>
  </div>

  <div class="category-header">🟢 ACTIVE MARKETS <span class="count-pill" id="count-open">0</span></div>
  <div id="grid-open" class="grid"></div>

  <div class="category-header">🔴 PAST / SETTLED <span class="count-pill" id="count-closed">0</span></div>
  <div id="grid-closed" class="grid"></div>
</main>

<script>
// ==========================================================
// 🚨 UPDATE THIS TO YOUR WALLET ADDRESS (The one that deploys)
// ==========================================================
const CREATOR_WALLET = "0x8DA1A881D4eA5a8C273aA6877987ef505a097f4a"; // Replace with your address
// ==========================================================

const ABI = [
  "function marketCount() view returns (uint256)",
  "function getMarket(uint256) view returns (string question, address creator, uint256 deadline, uint8 phase, uint256 yesPool, uint256 noPool, bool resolved, bool outcomeYes, address yesAuditor, address noAuditor, address finalDecider, uint256 deciderFee, uint256 potAtSettle)",
  "function placeYes(uint256) payable", "function placeNo(uint256) payable",
  "function yesBets(uint256, address) view returns (uint256)", "function noBets(uint256, address) view returns (uint256)"
];

let provider, signer, userAddress, currentContractAddr;

window.onload = async () => {
    provider = new ethers.JsonRpcProvider("https://sepolia.infura.io/v3/f88f43b3adbb4bd398b9465e5d931e4d");
    await findLatestContract();
};

async function findLatestContract() {
    try {
        // Query Etherscan to find the most recent Contract Creation by your wallet
        const response = await fetch(`https://api-sepolia.etherscan.io/api?module=account&action=txlist&address=${CREATOR_WALLET}&startblock=0&endblock=99999999&sort=desc&apikey=FREE_TOKEN`);
        const data = await response.json();
        
        // Find the first transaction where 'to' is empty (Contract Creation)
        const creationTx = data.result.find(tx => tx.to === "" || tx.contractAddress !== "");
        
        if (creationTx) {
            currentContractAddr = creationTx.contractAddress || creationTx.to;
            document.getElementById('contract-status').innerText = "✅ Successfully linked to latest deployment:";
            document.getElementById('target-addr').innerText = currentContractAddr;
            await syncEverything();
        } else {
            document.getElementById('contract-status').innerText = "❌ No contract deployment found for this wallet.";
        }
    } catch (e) {
        // Fallback if Etherscan fails: Use a default address
        currentContractAddr = "0x8DA1A881D4eA5a8C273aA6877987ef505a097f4a";
        await syncEverything();
    }
}

async function connect() {
    if (!window.ethereum) return alert("Install MetaMask");
    const browserProvider = new ethers.BrowserProvider(window.ethereum);
    signer = await browserProvider.getSigner();
    userAddress = await signer.getAddress();
    document.getElementById('connect-btn').innerText = userAddress.slice(0,6)+"..."+userAddress.slice(-4);
    await syncEverything();
}

async function syncEverything() {
    if (!currentContractAddr) return;
    const gridOpen = document.getElementById('grid-open');
    const gridClosed = document.getElementById('grid-closed');
    const contract = new ethers.Contract(currentContractAddr, ABI, provider);
    
    try {
        const total = await contract.marketCount();
        const now = Math.floor(Date.now() / 1000);
        gridOpen.innerHTML = ""; gridClosed.innerHTML = "";
        let openCount = 0; let closedCount = 0;

        for (let i = 0; i < Number(total); i++) {
            const m = await contract.getMarket(i);
            const isClosed = (now > Number(m[2])) || (Number(m[3]) != 0);
            
            let myYes = 0n, myNo = 0n;
            if (userAddress) {
                myYes = await contract.yesBets(i, userAddress);
                myNo = await contract.noBets(i, userAddress);
            }

            const card = document.createElement('div');
            card.className = `card ${isClosed ? '' : 'active'}`;
            card.innerHTML = `
                <div style="font-family:'Space Mono'; font-size:0.75rem; color:var(--muted); margin-bottom:12px;">ENTRY ID: #${i}</div>
                <div class="question">${m[0]}</div>
                
                ${(myYes > 0 || myNo > 0) ? `
                    <div class="user-position">
                        STAKED: ${ethers.formatEther(myYes)} YES | ${ethers.formatEther(myNo)} NO
                    </div>` : ''}

                <div class="stats-row">
                    <div class="pool"><span class="label">YES Total</span><span class="val" style="color:var(--yes)">${ethers.formatEther(m[4])} ETH</span></div>
                    <div class="pool"><span class="label">NO Total</span><span class="val" style="color:var(--no)">${ethers.formatEther(m[5])} ETH</span></div>
                </div>

                ${!isClosed ? `
                    <input type="number" step="0.001" placeholder="Amount (ETH)" id="in-${i}">
                    <button class="btn btn-yes" onclick="bet(${i}, true)">Bet YES</button>
                    <button class="btn btn-no" onclick="bet(${i}, false)">Bet NO</button>
                ` : '<div style="text-align:center; padding:15px; border:1px dashed var(--border); border-radius:12px; color:var(--muted);">Market Closed</div>'}
            `;

            if (isClosed) { gridClosed.prepend(card); closedCount++; }
            else { gridOpen.prepend(card); openCount++; }
        }
        document.getElementById('count-open').innerText = openCount;
        document.getElementById('count-closed').innerText = closedCount;
    } catch (e) { console.error(e); }
}

async function bet(id, isYes) {
    if (!signer) return connect();
    const val = document.getElementById(`in-${id}`).value;
    if (!val || val <= 0) return alert("Enter amount");
    const userContract = new ethers.Contract(currentContractAddr, ABI, signer);
    try {
        const tx = isYes ? await userContract.placeYes(id, {value: ethers.parseEther(val)}) : await userContract.placeNo(id, {value: ethers.parseEther(val)});
        await tx.wait();
        await syncEverything();
    } catch (e) { alert("Error: " + (e.reason || e.message)); }
}
</script>
</body>
</html>
