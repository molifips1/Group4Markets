<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group 4 Prediction Market</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');

:root{--bg:#0a0a0f;--surface:#111118;--border:#1e1e2e;--accent:#f0c040;--green:#3dffa0;--red:#ff5f6d;--muted:#444466;--text:#e8e8f0;--subtext:#8888aa}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0}body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;opacity:.4}.wrap{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:0 24px 80px}header{display:flex;align-items:center;justify-content:space-between;padding:28px 0 24px;border-bottom:1px solid var(--border);margin-bottom:48px}.logo{display:flex;align-items:baseline;gap:10px}.logo-mark{font-size:1.4rem;font-weight:800;color:var(--accent)}.logo-sub{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);letter-spacing:.15em;text-transform:uppercase}#connectBtn{font-family:'DM Mono',monospace;font-size:.75rem;font-weight:500;padding:10px 20px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;transition:all .15s}#connectBtn:hover{background:var(--accent);color:var(--bg)}#connectBtn.connected{border-color:var(--green);color:var(--green)}.status-bar{background:var(--surface);border:1px solid var(--border);padding:12px 16px;margin-bottom:24px;border-radius:6px;font-family:'DM Mono',monospace;font-size:.75rem;display:flex;align-items:center;gap:8px}.spinner{width:8px;height:8px;background:var(--accent);border-radius:2px;animation:pulse 1.5s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}.status-bar.ready{border-color:var(--green)}.status-bar.ready .spinner{background:var(--green)}.tabs{display:flex;gap:0;margin-bottom:36px;border-bottom:1px solid var(--border)}.tab-btn{font-family:'DM Mono',monospace;font-size:.75rem;font-weight:600;padding:16px 24px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--subtext);cursor:pointer;transition:all .15s}.tab-btn:hover{color:var(--text)}.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}.tab-content{display:none}.tab-content.active{display:block}.bets-list{display:flex;flex-direction:column;gap:16px;margin-bottom:36px}.bet-item{background:var(--surface);border:1px solid var(--border);padding:18px 20px;cursor:pointer;transition:all .15s;display:flex;justify-content:space-between;align-items:center;gap:16px;border-radius:6px}.bet-item:hover{border-color:var(--accent);background:rgba(240,192,64,.05)}.bet-item-left{flex:1}.bet-item-question{font-size:.95rem;font-weight:600;line-height:1.3;margin-bottom:8px}.bet-item-meta{display:flex;gap:16px;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--subtext)}.bet-item-right{display:flex;align-items:center;gap:12px}.bet-status{font-family:'DM Mono',monospace;font-size:.65rem;font-weight:600;padding:6px 10px;border:1px solid;white-space:nowrap;border-radius:4px}.status-open{border-color:var(--green);color:var(--green)}.status-proposed{border-color:var(--accent);color:var(--accent)}.status-resolved{border-color:var(--muted);color:var(--muted)}.bet-odds{display:flex;gap:12px;text-align:center;font-size:.8rem;font-weight:700;min-width:80px}.odds-yes{color:var(--green)}.odds-no{color:var(--red)}.empty-message{text-align:center;padding:40px 20px;color:var(--subtext)}.market-card{display:none;background:var(--surface);border:1px solid var(--border);padding:24px;border-radius:6px;margin-bottom:24px}.market-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;gap:16px;flex-wrap:wrap}.market-question{font-size:1.55rem;font-weight:700;line-height:1.2;flex:1}.phase-badge{font-family:'DM Mono',monospace;font-size:.65rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;padding:6px 14px;border:1px solid;white-space:nowrap;border-radius:4px}.phase-open{border-color:var(--green);color:var(--green)}.phase-proposed{border-color:var(--accent);color:var(--accent)}.phase-settled{border-color:var(--muted);color:var(--muted)}.odds-block{margin-bottom:24px}.odds-bar{height:6px;background:var(--border);overflow:hidden;border-radius:3px;margin-bottom:8px}.odds-yes-bar{height:100%;background:var(--green);transition:width .5s ease}.odds-labels{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:.75rem;color:var(--subtext);margin-bottom:8px}.odds-pct{display:flex;justify-content:space-between;margin-top:8px;font-size:1.2rem;font-weight:800}.yes-pct{color:var(--green)}.no-pct{color:var(--red)}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin-bottom:24px;border-radius:6px;overflow:hidden}.stat{background:var(--surface);padding:16px;display:flex;flex-direction:column;gap:4px}.stat-label{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}.stat-value{font-size:1rem;font-weight:700}.action-panel{background:var(--surface);border:1px solid var(--border);padding:24px;margin-bottom:24px;border-radius:6px}.action-title{font-size:.65rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:16px}.bet-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}.bet-input-wrap{flex:1;min-width:140px}.bet-input-wrap label{display:block;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--subtext);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}.bet-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:.85rem;padding:10px 14px;outline:none;border-radius:4px}.bet-input:focus{border-color:var(--accent)}.btn-bet{font-family:'DM Mono',monospace;font-size:.75rem;font-weight:500;padding:11px 18px;border:none;cursor:pointer;letter-spacing:.06em;white-space:nowrap;transition:opacity .15s;border-radius:4px}.btn-yes{background:var(--green);color:var(--bg)}.btn-yes:hover:not(:disabled){opacity:.85}.btn-no{background:var(--red);color:var(--bg)}.btn-no:hover:not(:disabled){opacity:.85}.btn-bet:disabled{opacity:.4;cursor:not-allowed}.btn-claim{font-family:'DM Mono',monospace;font-size:.75rem;font-weight:500;padding:11px 24px;background:var(--green);color:var(--bg);border:none;cursor:pointer;border-radius:4px;transition:opacity .15s}.btn-claim:hover{opacity:.85}.log{background:var(--bg);border:1px solid var(--border);padding:12px;max-height:120px;overflow-y:auto;font-family:'DM Mono',monospace;font-size:.7rem;line-height:1.4;border-radius:4px}.log div{padding:3px 0}.log .ok{color:var(--green)}.log .info{color:var(--accent)}.log .err{color:var(--red)}.back-btn{font-family:'DM Mono',monospace;font-size:.75rem;font-weight:500;padding:10px 20px;border:1px solid var(--border);background:var(--surface);color:var(--accent);cursor:pointer;letter-spacing:.08em;text-transform:uppercase;margin-bottom:24px;transition:all .15s;border-radius:4px}.back-btn:hover{border-color:var(--accent);background:rgba(240,192,64,.1)}@media (max-width:640px){.bet-item{flex-direction:column;align-items:flex-start}.bet-item-right{width:100%;justify-content:space-between}.stats{grid-template-columns:1fr}.btn-bet{width:100%}}
</style>
</head>
<body>
<div class="wrap">
<header>
<div class="logo">
<div class="logo-mark">⬢</div>
<div class="logo-sub">Group 4<br>Prediction Market</div>
</div>
<button id="connectBtn">Connect MetaMask</button>
</header>
<div class="status-bar" id="statusBar">
<div class="spinner"></div>
<span id="statusText">Scanning for contracts...</span>
</div>
<div class="tabs">
<button class="tab-btn active" onclick="switchTab('active')">🎯 Active Bets</button>
<button class="tab-btn" onclick="switchTab('history')">📊 Past Bets</button>
<button class="tab-btn" onclick="switchTab('detail')">Market Details</button>
</div>
<div id="activeTab" class="tab-content active">
<div class="bets-list" id="activeBetsList"></div>
<div id="activeBetsEmpty" class="empty-message" style="display:none;">No active bets found</div>
</div>
<div id="historyTab" class="tab-content">
<div class="bets-list" id="pastBetsList"></div>
<div id="pastBetsEmpty" class="empty-message" style="display:none;">No past bets found</div>
</div>
<div id="detailTab" class="tab-content">
<button class="back-btn" onclick="switchTab('active')">← Back to Bets</button>
<div class="market-card" id="marketCard">
<div class="market-header">
<div class="market-question" id="marketQuestion"></div>
<div class="phase-badge" id="phaseBadge"></div>
</div>
<div class="odds-block">
<div class="odds-labels"><span>YES</span><span>NO</span></div>
<div class="odds-bar">
<div class="odds-yes-bar" id="oddsYes" style="width:50%"></div>
</div>
<div class="odds-pct">
<span class="yes-pct" id="yesPct">50%</span>
<span class="no-pct" id="noPct">50%</span>
</div>
</div>
<div class="stats">
<div class="stat">
<div class="stat-label">Total Pot</div>
<div class="stat-value" id="totalPot">0 ETH</div>
</div>
<div class="stat">
<div class="stat-label">Time Left</div>
<div class="stat-value" id="countdown">—</div>
</div>
<div class="stat">
<div class="stat-label">Your Position</div>
<div class="stat-value" id="yourPosition">—</div>
</div>
</div>
<div class="action-panel" id="bettingPanel">
<div class="action-title">Place a Bet</div>
<div class="bet-row">
<div class="bet-input-wrap">
<label>Amount (ETH)</label>
<input type="number" id="betAmount" placeholder="0.01" step="0.001">
</div>
<button class="btn-bet btn-yes" id="btnYes" onclick="placeBet(true)">Bet YES</button>
<button class="btn-bet btn-no" id="btnNo" onclick="placeBet(false)">Bet NO</button>
</div>
</div>
<div id="claimSection" style="display:none;">
<button class="btn-claim" id="btnClaim" onclick="claimWinnings()">Claim Winnings</button>
</div>
<div class="log" id="statusLog"></div>
</div>
</div>
</div>
<script>
const SEPOLIA_RPC="https://sepolia.infura.io/v3/f88f43b3adbb4bd398b9465e5d931e4d";const DEPLOYER_ADDRESS="0xb215b5153dafb7Ea3BFc3eaA903E472BD21579F4";const CONTRACT_ABI=["function getMarketCount() public view returns (uint256)","function markets(uint256 id) public view returns (address creator, string memory question, uint256 creationTime, uint256 deadline, uint256 phaseEndTime, uint8 phase, uint256 potYes, uint256 potNo, uint256 potAtSettle, uint256 deciderFee, bool outcomeYes, address yesAuditor, address noAuditor, address finalDecider)","function userBets(address user, uint256 marketId) public view returns (uint256 yesAmount, uint256 noAmount)","function placeYes(uint256 marketId) public payable","function placeNo(uint256 marketId) public payable","function claim(uint256 marketId) public"];let provider,signer,userAddress;let allMarkets=[],deployedContracts=[],selectedMarketId=null,selectedContractIndex=null,countdownTimer=null;document.addEventListener("DOMContentLoaded",async()=>{if(window.ethereum){window.ethereum.on("accountsChanged",accounts=>{if(accounts.length===0){document.getElementById("connectBtn").textContent="Connect MetaMask";document.getElementById("connectBtn").classList.remove("connected");userAddress=null;signer=null}else{connectWallet()}})}document.getElementById("connectBtn").onclick=connectWallet;await scanForContracts()});async function connectWallet(){try{const accounts=await window.ethereum.request({method:"eth_requestAccounts"});userAddress=accounts[0];provider=new ethers.BrowserProvider(window.ethereum);signer=await provider.getSigner();const btn=document.getElementById("connectBtn");btn.textContent=userAddress.slice(0,6)+"..."+userAddress.slice(-4);btn.classList.add("connected");log("statusLog","✓ Wallet connected","ok")}catch(e){log("statusLog","Connection failed: "+e.message,"err")}}async function scanForContracts(){try{updateStatus("Scanning for contracts...");log("statusLog","🔍 Starting contract scan...","info");provider=new ethers.JsonRpcProvider(SEPOLIA_RPC);const currentBlock=await provider.getBlockNumber();log("statusLog",`Current block: ${currentBlock}`,"info");deployedContracts=[];allMarkets=[];const batchSize=5000;for(let startBlock=0;startBlock<=currentBlock;startBlock+=batchSize){const endBlock=Math.min(startBlock+batchSize-1,currentBlock);updateStatus(`Scanning blocks ${startBlock} - ${endBlock}...`);try{for(let blockNum=startBlock;blockNum<=endBlock;blockNum++){try{const block=await provider.getBlock(blockNum,true);if(!block||!block.transactions)continue;for(const tx of block.transactions){if(tx.from.toLowerCase()===DEPLOYER_ADDRESS.toLowerCase()&&tx.to===null){const receipt=await provider.getTransactionReceipt(tx.hash);if(receipt&&receipt.contractAddress){try{const contract=new ethers.Contract(receipt.contractAddress,CONTRACT_ABI,provider);const count=await contract.getMarketCount();const countNum=parseInt(count.toString());if(countNum>0){deployedContracts.push({address:receipt.contractAddress,marketCount:countNum,contract:contract});log("statusLog",`✓ Found market contract with ${countNum} markets`,"ok")}}catch(e){}}}}}catch(e){}}}}catch(e){log("statusLog",`Batch error: ${e.message.slice(0,50)}`,"err")}}log("statusLog",`Found ${deployedContracts.length} market contract(s)`,"ok");for(let i=0;i<deployedContracts.length;i++){const{address,marketCount,contract}=deployedContracts[i];log("statusLog",`Loading ${marketCount} markets from ${address.slice(0,10)}...`,"info");for(let marketId=0;marketId<marketCount;marketId++){try{const market=await contract.markets(marketId);let userBets={0:0n,1:0n};if(userAddress){userBets=await contract.userBets(userAddress,marketId)}allMarkets.push({id:marketId,contractIndex:i,contractAddress:address,creator:market[0],question:market[1],creationTime:market[2],deadline:market[3],phaseEndTime:market[4],phase:market[5],potYes:market[6],potNo:market[7],potAtSettle:market[8],deciderFee:market[9],outcomeYes:market[10],yesAuditor:market[11],noAuditor:market[12],finalDecider:market[13],userYes:userBets[0],userNo:userBets[1]})}catch(e){console.error(`Error loading market ${marketId}:`,e)}}}updateStatus("Ready",true);log("statusLog",`✓ Loaded ${allMarkets.length} total markets`,"ok");renderBets()}catch(error){updateStatus("Scan failed",false);log("statusLog","Scan error: "+error.message,"err")}}function updateStatus(text,isReady=false){const bar=document.getElementById("statusBar");document.getElementById("statusText").textContent=text;if(isReady){bar.classList.add("ready")}}function renderBets(){const now=Math.floor(Date.now()/1000);const activeBets=allMarkets.filter(m=>m.phase<2&&m.deadline>now);const pastBets=allMarkets.filter(m=>m.phase===2||m.deadline<=now&&m.phase<2);renderList(activeBets,"activeBetsList","activeBetsEmpty");renderList(pastBets,"pastBetsList","pastBetsEmpty")}function renderList(bets,listId,emptyId){const list=document.getElementById(listId);const empty=document.getElementById(emptyId);if(bets.length===0){list.innerHTML="";empty.style.display="block";return}empty.style.display="none";list.innerHTML="";bets.forEach(m=>{const item=document.createElement("div");item.className="bet-item";item.onclick=()=>selectMarket(m.id,m.contractIndex);const total=m.potYes+m.potNo;const yesP=total>0?(Number(m.potYes)/Number(total)*100).toFixed(0):50;const noP=100-yesP;const now=Math.floor(Date.now()/1000);let status="Open",statusClass="status-open";if(m.phase===2){status="Resolved";statusClass="status-resolved"}else if(m.phase===1){status="Proposed";statusClass="status-proposed"}let time="Closed";if(m.phase<2&&m.deadline>now){const remaining=m.deadline-now;const days=Math.floor(remaining/86400);const hours=Math.floor(remaining%86400/3600);time=`${days}d ${hours}h`}const pool=ethers.formatEther(total);item.innerHTML=`<div class="bet-item-left"><div class="bet-item-question">${m.question}</div><div class="bet-item-meta"><span>💰 ${parseFloat(pool).toFixed(3)} ETH</span><span>⏱ ${time}</span></div></div><div class="bet-item-right"><div class="bet-odds"><span class="odds-yes">${yesP}%</span><span class="odds-no">${noP}%</span></div><div class="bet-status ${statusClass}">${status}</div></div>`;list.appendChild(item)})}function selectMarket(id,contractIndex){const m=allMarkets.find(x=>x.id===id&&x.contractIndex===contractIndex);if(!m)return;selectedMarketId=id;selectedContractIndex=contractIndex;updateUI();switchTab('detail')}function switchTab(tab){document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));document.getElementById(tab+'Tab').classList.add('active');event.target.classList.add('active')}async function updateUI(){if(selectedMarketId===null||selectedContractIndex===null)return;try{const m=allMarkets.find(x=>x.id===selectedMarketId&&x.contractIndex===selectedContractIndex);if(!m)return;document.getElementById("marketCard").style.display="block";document.getElementById("marketQuestion").textContent=m.question;const now=Math.floor(Date.now()/1000);const phase=m.phase;const deadline=m.deadline;const badge=document.getElementById("phaseBadge");badge.textContent=phase===2?"SETTLED":phase===1?"PROPOSED":"OPEN";badge.className=phase===2?"phase-badge phase-settled":phase===1?"phase-badge phase-proposed":"phase-badge phase-open";const totalPot=m.potYes+m.potNo;const yesPercentage=totalPot>0?Number(m.potYes)/Number(totalPot):.5;document.getElementById("oddsYes").style.width=yesPercentage*100+"%";document.getElementById("yesPct").textContent=(yesPercentage*100).toFixed(1)+"%";document.getElementById("noPct").textContent=((1-yesPercentage)*100).toFixed(1)+"%";const potETH=ethers.formatEther(totalPot);document.getElementById("totalPot").textContent=parseFloat(potETH).toFixed(5)+" ETH";const yETH=ethers.formatEther(m.userYes);const nETH=ethers.formatEther(m.userNo);let posText="—";if(m.userYes>0n)posText=parseFloat(yETH).toFixed(3)+" ETH on YES";if(m.userNo>0n)posText=parseFloat(nETH).toFixed(3)+" ETH on NO";document.getElementById("yourPosition").textContent=posText;startCountdown(deadline,phase);const expired=now>=deadline;document.getElementById("bettingPanel").style.display=phase===0&&!expired?"block":"none";document.getElementById("claimSection").style.display=phase===2&&(m.userYes>0n||m.userNo>0n)?"block":"none";document.getElementById("btnYes").disabled=expired;document.getElementById("btnNo").disabled=expired}catch(e){log("statusLog","Error: "+e.message,"err")}}function startCountdown(deadline,phase){clearInterval(countdownTimer);const el=document.getElementById("countdown");if(phase!==0){el.textContent="—";return}function tick(){const remaining=deadline-Math.floor(Date.now()/1000);if(remaining<=0){el.textContent="Betting closed";clearInterval(countdownTimer);return}const m=Math.floor(remaining/60);const s=remaining%60;el.textContent=`${m}m ${String(s).padStart(2,"0")}s`}tick();countdownTimer=setInterval(tick,1000)}async function placeBet(isYes){if(!signer){alert("Connect wallet first");return}const amtStr=document.getElementById("betAmount").value;const amt=parseFloat(amtStr);if(!amt||amt<=0){alert("Enter valid amount");return}const btn=isYes?document.getElementById("btnYes"):document.getElementById("btnNo");btn.disabled=true;try{log("statusLog",`Placing ${isYes?"YES":"NO"} bet...`,"info");const contract=deployedContracts[selectedContractIndex].contract;const c=contract.connect(signer);const fn=isYes?c.placeYes:c.placeNo;const tx=await fn(selectedMarketId,{value:ethers.parseEther(amtStr)});log("statusLog",`TX: ${tx.hash.slice(0,18)}...`,"info");await tx.wait();log("statusLog","✓ Bet confirmed!","ok");await scanForContracts();updateUI();document.getElementById("betAmount").value=""}catch(e){log("statusLog","Failed: "+(e.reason||e.message),"err")}btn.disabled=false}async function claimWinnings(){if(!signer){alert("Connect wallet first");return}try{log("statusLog","Claiming...","info");const contract=deployedContracts[selectedContractIndex].contract;const tx=await contract.connect(signer).claim(selectedMarketId);log("statusLog",`TX: ${tx.hash.slice(0,18)}...`,"info");await tx.wait();log("statusLog","✓ Claimed!","ok");await scanForContracts();updateUI()}catch(e){log("statusLog","Failed: "+(e.reason||e.message),"err")}}function log(targetId,msg,type=""){const el=document.getElementById(targetId);if(!el)return;const line=document.createElement("div");if(type)line.classList.add(type);line.innerHTML=msg;el.appendChild(line);el.scrollTop=el.scrollHeight}
</script>
</body>
</html>
