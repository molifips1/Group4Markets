<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Group4Market — Live Factory</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap');
  :root { --bg: #0a0b0f; --surface: #111318; --border: #1e2029; --text: #e8eaf0; --accent: #7c6cff; --yes: #00d98b; --no: #ff4d6d; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px; }
  
  header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; }
  .logo { font-family: 'Space Mono', monospace; font-size: 2.5rem; font-weight: 700; color: var(--accent); letter-spacing: -2px; margin: 0; }
  
  .market-stats { background: #000; border: 1px solid var(--border); padding: 12px 20px; border-radius: 8px; font-family: 'Space Mono'; font-size: 0.85rem; color: var(--accent); margin-bottom: 30px; display: inline-block; }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 25px; border-top: 6px solid var(--accent); transition: 0.3s; }
  .card:hover { transform: translateY(-5px); border-color: var(--accent); }
  
  .id-badge { font-family: 'Space Mono'; font-size: 0.7rem; color: #6b7080; text-transform: uppercase; margin-bottom: 10px; }
  .question { font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; min-height: 3.5rem; line-height: 1.2; }
  
  .pools { display: flex; gap: 12px; margin-bottom: 20px; }
  .pool-box { flex: 1; background: #000; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
  .pool-box small { font-size: 0.65rem; color: #6b7080; display: block; margin-bottom: 4px; }
  .pool-box b { font-family: 'Space Mono'; font-size: 1.1rem; }

  .btn-bet { width: 100%; padding: 12px; border: none; border-radius: 8px; font-family: 'Space Mono'; font-weight: 700; cursor: pointer; margin-top: 8px; transition: 0.2s; }
  .btn-yes { background: var(--yes); color: #003b26; }
  .btn-no { background: var(--no); color: white; }
  input { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; font-family: 'Space Mono'; }
</style>
</head>
<body>

<header>
  <h1 class="logo">Group4Market</h1>
  <div id="status-pill" class="market-stats">Connecting to Sepolia...</div>
</header>

<div id="market-grid" class="grid"></div>

<script>
// YOUR PERMANENT CONTRACT SETTINGS
const CONTRACT_ADDRESS = "0x2e5E1c6B47C34Ff2718E357A4009e03bF8aD1ec0";
const RPC_URL = "https://sepolia.infura.io/v3/f88f43b3adbb4bd398b9465e5d931e4d";
const ABI = [
  "function marketCount() view returns (uint256)",
  "function getMarket(uint256) view returns (string question, address creator, uint256 deadline, uint8 phase, uint256 yesPool, uint256 noPool, bool resolved, bool outcomeYes, address yesAuditor, address noAuditor, address finalDecider, uint256 deciderFee, uint256 potAtSettle)",
  "function placeYes(uint256) payable",
  "function placeNo(uint256) payable"
];

let provider, signer;

window.onload = async () => {
    provider = new ethers.JsonRpcProvider(RPC_URL);
    loadMarkets();
};

async function loadMarkets() {
    const grid = document.getElementById('market-grid');
    const status = document.getElementById('status-pill');
    
    try {
        const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);
        const count = await contract.marketCount();
        
        status.innerText = `📡 Factory Active: ${count} Markets Found`;
        grid.innerHTML = "";

        // Loop through all markets in this single contract
        for (let i = 0; i < Number(count); i++) {
            const m = await contract.getMarket(i);
            const card = document.createElement('div');
            card.className = "card";
            card.innerHTML = `
                <div class="id-badge">Market #${i}</div>
                <div class="question">${m[0]}</div>
                <div class="pools">
                    <div class="pool-box"><small>YES POOL</small><b style="color:var(--yes)">${ethers.formatEther(m[4])}</b></div>
                    <div class="pool-box"><small>NO POOL</small><b style="color:var(--no)">${ethers.formatEther(m[5])}</b></div>
                </div>
                <input type="number" step="0.01" placeholder="Amount (ETH)" id="bet-${i}">
                <button class="btn-bet btn-yes" onclick="bet(${i}, true)">VOTE YES</button>
                <button class="btn-bet btn-no" onclick="bet(${i}, false)">VOTE NO</button>
            `;
            grid.appendChild(card);
        }
    } catch (err) {
        status.innerText = "❌ Error: Could not reach contract.";
        console.error(err);
    }
}

async function bet(id, isYes) {
    if (!window.ethereum) return alert("Please install MetaMask");
    const browserProvider = new ethers.BrowserProvider(window.ethereum);
    const signer = await browserProvider.getSigner();
    const userContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
    
    const amount = document.getElementById(`bet-${id}`).value;
    if (!amount || amount <= 0) return alert("Enter a valid ETH amount");

    try {
        const tx = isYes ? 
            await userContract.placeYes(id, { value: ethers.parseEther(amount) }) : 
            await userContract.placeNo(id, { value: ethers.parseEther(amount) });
        
        document.getElementById('status-pill').innerText = "⏳ Transaction Pending...";
        await tx.wait();
        loadMarkets(); // Refresh data
    } catch (err) {
        alert("Transaction failed: " + (err.reason || err.message));
    }
}
</script>
</body>
</html>
