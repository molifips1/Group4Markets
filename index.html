<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Group4Market — Live Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap');
        :root { --bg: #0a0b0f; --surface: #111318; --border: #1e2029; --text: #e8eaf0; --accent: #7c6cff; --yes: #00d98b; --no: #ff4d6d; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        
        /* BIGGER LOGO & HEADER */
        header { 
            position: sticky; top: 0; background: rgba(10,11,15,0.9); backdrop-filter: blur(10px); 
            border-bottom: 1px solid var(--border); padding: 2rem 4rem; 
            display: flex; justify-content: space-between; align-items: center; z-index: 100; 
        }
        .logo-box { display: flex; flex-direction: column; }
        .logo { font-family: 'Space Mono', monospace; font-weight: 700; color: var(--accent); font-size: 3.2rem; letter-spacing: -3px; line-height: 1; }
        .network { font-size: 0.9rem; color: #ff9f43; text-transform: uppercase; margin-top: 5px; font-family: 'Space Mono'; }

        .main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .section-title { font-size: 1.8rem; margin: 2rem 0; border-left: 5px solid var(--accent); padding-left: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2rem; }
        
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; border-top: 5px solid var(--muted); transition: 0.3s; }
        .card.open { border-top-color: var(--yes); }
        .card.closed { border-top-color: #6b7080; opacity: 0.7; }
        
        .question { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.5rem; line-height: 1.3; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-family: 'Space Mono'; margin-top: 10px; }
        .btn-yes { background: var(--yes); color: #003b26; }
        .btn-no { background: var(--no); color: white; }
        input { background: var(--bg); border: 1px solid var(--border); color: white; padding: 12px; width: 100%; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <div class="logo">Group4Market</div>
        <div class="network">● Sepolia Testnet</div>
    </div>
    <button id="connect-btn" class="btn" style="width:auto; background:var(--accent); color:white; padding: 10px 20px;" onclick="connect()">Connect Wallet</button>
</header>

<main class="main">
    <h2 class="section-title">Active Markets</h2>
    <div id="grid-open" class="grid"></div>

    <h2 class="section-title">Closed Markets</h2>
    <div id="grid-closed" class="grid"></div>
</main>

<script>
// IMPORTANT: Replace this with the address from your Python notebook output
const CONTRACT_ADDRESS = "YOUR_DEPLOYED_CONTRACT_ADDRESS_HERE";

const ABI = [
    "function marketCount() view returns (uint256)",
    "function getMarket(uint256) view returns (string question, address creator, uint256 deadline, uint8 phase, uint256 yesPool, uint256 noPool, bool resolved, bool outcomeYes, address yesAuditor, address noAuditor, address finalDecider, uint256 deciderFee, uint256 potAtSettle)",
    "function placeYes(uint256) payable",
    "function placeNo(uint256) payable"
];

let provider, signer;

window.onload = async () => {
    provider = new ethers.JsonRpcProvider("https://sepolia.infura.io/v3/f88f43b3adbb4bd398b9465e5d931e4d");
    await syncMarkets();
};

async function syncMarkets() {
    const gridOpen = document.getElementById('grid-open');
    const gridClosed = document.getElementById('grid-closed');
    const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);
    
    try {
        // 1. ASK THE CONTRACT FOR THE TOTAL COUNT
        const total = await contract.marketCount();
        const now = Math.floor(Date.now() / 1000);
        
        gridOpen.innerHTML = ""; gridClosed.innerHTML = "";

        // 2. LOOP THROUGH EVERY MARKET
        for (let i = 0; i < Number(total); i++) {
            const m = await contract.getMarket(i);
            const isClosed = (now > Number(m[2])) || (Number(m[3]) != 0);

            const card = document.createElement('div');
            card.className = `card ${isClosed ? 'closed' : 'open'}`;
            card.innerHTML = `
                <div style="font-family:'Space Mono'; font-size:0.7rem; color:var(--accent); margin-bottom:5px;">MARKET ID: #${i}</div>
                <div class="question">${m[0]}</div>
                <div style="display:flex; gap:10px; margin-bottom:1rem;">
                    <div style="flex:1; background:var(--bg); padding:10px; border-radius:8px; text-align:center;">
                        <small>YES POOL</small><br><b>${ethers.formatEther(m[4])} ETH</b>
                    </div>
                    <div style="flex:1; background:var(--bg); padding:10px; border-radius:8px; text-align:center;">
                        <small>NO POOL</small><br><b>${ethers.formatEther(m[5])} ETH</b>
                    </div>
                </div>
                ${!isClosed ? `
                    <input type="number" step="0.001" placeholder="Amount (ETH)" id="input-${i}">
                    <button class="btn btn-yes" onclick="bet(${i}, true)">Bet YES</button>
                    <button class="btn btn-no" onclick="bet(${i}, false)">Bet NO</button>
                ` : '<div style="text-align:center; color:var(--no);">BETTING CLOSED</div>'}
            `;

            if (isClosed) gridClosed.prepend(card);
            else gridOpen.prepend(card);
        }
    } catch (e) { console.error(e); }
}

async function connect() {
    if (!window.ethereum) return alert("Install MetaMask");
    const browserProvider = new ethers.BrowserProvider(window.ethereum);
    signer = await browserProvider.getSigner();
    const addr = await signer.getAddress();
    document.getElementById('connect-btn').innerText = addr.slice(0,6)+"..."+addr.slice(-4);
    await syncMarkets();
}

async function bet(id, isYes) {
    if (!signer) return connect();
    const val = document.getElementById(`input-${id}`).value;
    if (!val) return alert("Enter an amount");
    const userContract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
    try {
        const tx = isYes ? 
            await userContract.placeYes(id, {value: ethers.parseEther(val)}) : 
            await userContract.placeNo(id, {value: ethers.parseEther(val)});
        await tx.wait();
        await syncMarkets();
    } catch (e) { alert(e.message); }
}
</script>
</body>
</html>
